  :root{
    --bg:#F6F4EF; --surface:#FFFFFF; --surface-2:#FBFAF7; --surface-3:#F1EEE7;
    --ink:#1C1B18; --ink-soft:#6A6459; --ink-faint:#A8A294;
    --line:#E9E4DA; --line-strong:#DCD6CA;
    --green:#2F7A4F; --green-2:#E7F1EA; --on-green:#FFFFFF;
    --amber:#9C6710; --amber-2:#FBF0DC;
    --red:#C0392B;
    --shadow-sm:0 1px 2px rgba(28,27,24,.05);
    --shadow:0 1px 2px rgba(28,27,24,.04), 0 10px 26px -8px rgba(28,27,24,.10);
    --shadow-lg:0 12px 40px -8px rgba(28,27,24,.22);
    --blur:saturate(180%) blur(20px);
    --r-card:18px; --r-pill:999px;
    --tabbar-h:60px;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --font:-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --display:"Fraunces", ui-serif, Georgia, "Times New Roman", serif;
    --ease:cubic-bezier(.32,.72,0,1);
  }
  html[data-theme="dark"]{
    --bg:#141410; --surface:#1E1D17; --surface-2:#232219; --surface-3:#2A2920;
    --ink:#F2EFE6; --ink-soft:#A39C8C; --ink-faint:#6F6A5C;
    --line:#2C2B22; --line-strong:#3A3830;
    --green:#5FBE86; --green-2:#1B2E22; --on-green:#0E1A12;
    --amber:#E0A23A; --amber-2:#2E2613;
    --red:#E5705F;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 1px 2px rgba(0,0,0,.25), 0 12px 28px -10px rgba(0,0,0,.5);
    --shadow-lg:0 16px 44px -10px rgba(0,0,0,.6);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:var(--font); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overscroll-behavior-y:none; -webkit-user-select:none; user-select:none;
    font-size:17px; line-height:1.4;
  }
  input,button,select,textarea{font-family:var(--font); color:inherit;}
  button{cursor:pointer;}
  ::placeholder{color:var(--ink-faint);}

  .app{max-width:600px; margin:0 auto; height:100%; position:relative; overflow:hidden; z-index:1;}
  body::before{ content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(130% 70% at 50% -15%, color-mix(in srgb, var(--green) 9%, transparent), transparent 58%),
      radial-gradient(90% 50% at 85% 8%, color-mix(in srgb, var(--amber) 6%, transparent), transparent 60%);
  }
  html[data-theme="dark"] body::before{
    background:
      radial-gradient(130% 70% at 50% -15%, color-mix(in srgb, var(--green) 14%, transparent), transparent 55%),
      radial-gradient(90% 50% at 85% 8%, color-mix(in srgb, var(--amber) 8%, transparent), transparent 60%);
  }

  /* ---------- Top bar (compact title) ---------- */
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:30;
    padding-top:var(--safe-t); height:calc(var(--safe-t) + 50px);
    display:flex; align-items:center; justify-content:center;
    background:transparent; transition:background .25s ease, border-color .25s ease;
    border-bottom:.5px solid transparent;
  }
  .topbar.scrolled{ background:color-mix(in srgb, var(--bg) 80%, transparent); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border-bottom-color:var(--line); }
  .topbar .ctitle{ font-size:17px; font-weight:700; letter-spacing:-.01em; opacity:0; transform:translateY(2px); transition:opacity .2s ease, transform .2s ease; }
  .topbar.scrolled .ctitle{ opacity:1; transform:none; }

  /* ---------- Scroll area ---------- */
  main{ position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-left:max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right)); }
  main::-webkit-scrollbar{ display:none; }
  .pad-bottom{ height:calc(var(--tabbar-h) + var(--safe-b) + 24px); }
  .pad-bottom.with-total{ height:calc(var(--tabbar-h) + var(--safe-b) + 132px); }

  .largehead{ padding:calc(var(--safe-t) + 54px) 4px 6px; }
  h1{ font-family:var(--display); font-size:31px; line-height:1.06; font-weight:600; letter-spacing:-.01em; margin:2px 0 3px; }
  .subhead{ font-size:14px; color:var(--ink-soft); }
  .topbar .gear{ position:absolute; right:max(8px, env(safe-area-inset-right)); top:calc(var(--safe-t) + 7px); width:36px; height:36px; border:0; background:transparent; color:var(--ink-soft); display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background .15s ease, color .15s ease; }
  .topbar .gear svg{ width:23px; height:23px; }
  .topbar .gear:active{ background:var(--surface-3); }

  html,body{ overflow:hidden; }

  /* ---------- Add bar ---------- */
  .addwrap{ position:sticky; top:calc(var(--safe-t) + 50px); z-index:20; padding:6px 0 12px; background:transparent; transition:background .25s ease; }
  .addwrap.stuck{ background:color-mix(in srgb, var(--bg) 68%, transparent); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); }
  .field{ display:flex; align-items:center; width:100%; min-width:0; background:var(--surface); border:1px solid var(--line); border-radius:17px; padding:5px 5px 5px 15px; box-shadow:var(--shadow-sm); transition:border-color .18s ease, box-shadow .18s ease; }
  .field:focus-within{ border-color:color-mix(in srgb, var(--green) 55%, var(--line)); box-shadow:0 0 0 4px var(--green-2); }
  .field svg.lead{ width:20px; height:20px; color:var(--ink-faint); flex:0 0 20px; margin-right:10px; }
  .field input.name{ flex:1 1 0; min-width:0; border:0; outline:0; background:transparent; font-size:17px; padding:12px 0; -webkit-user-select:text; user-select:text; }
  .field input.name::-webkit-search-cancel-button, .field input.name::-webkit-search-decoration{ -webkit-appearance:none; appearance:none; display:none; }
  .pw{ display:inline-flex; align-items:center; gap:3px; flex:0 0 auto; margin:0 9px; padding:7px 11px; background:var(--surface-3); border-radius:12px; }
  .pw .cur{ color:var(--ink-soft); font-weight:700; font-size:14px; }
  .pw input.pricein{ border:0; outline:0; background:transparent; font-size:15px; font-weight:700; color:var(--amber); width:46px; text-align:right; padding:4px 0; -webkit-user-select:text; user-select:text; }
  .pw input.pricein::placeholder{ color:var(--ink-faint); font-weight:600; }
  .addbtn{ flex:0 0 42px; width:42px; height:42px; border:0; border-radius:13px; background:var(--green); color:var(--on-green); display:flex; align-items:center; justify-content:center; margin-left:0; box-shadow:var(--shadow-sm); transition:transform .12s var(--ease), filter .12s ease; }
  .addbtn svg{ width:22px; height:22px; }
  .addbtn:active{ transform:scale(.88); filter:brightness(.96); }

  /* Autocomplete */
  .ac{ position:relative; }
  .ac-list{ position:absolute; left:0; right:0; top:calc(100% + 6px); background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-lg); overflow:hidden; z-index:40; display:none; }
  .ac-list.show{ display:block; }
  .ac-item{ display:flex; align-items:center; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .ac-item:last-child{ border-bottom:0; }
  .ac-item:active{ background:var(--surface-3); }
  .ac-emoji{ font-size:19px; width:24px; text-align:center; }
  .ac-name{ flex:1; font-size:16px; font-weight:500; }
  .ac-tag{ font-size:12px; color:var(--ink-faint); font-weight:600; }
  .ac-add{ color:var(--green); font-weight:700; font-size:20px; }

  /* ---------- Sections & rows ---------- */
  .section{ display:flex; align-items:center; gap:8px; margin:20px 6px 8px; font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); }
  .section .cat-emoji{ font-size:15px; }
  .section .count{ color:var(--ink-faint); font-weight:600; }
  .section .spacer{ flex:1; }
  .section .link{ text-transform:none; letter-spacing:0; font-size:14px; font-weight:600; color:var(--green); }

  ul.list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .row{ position:relative; border-radius:var(--r-card); overflow:hidden; }
  .row .behind{ position:absolute; inset:0; background:var(--red); display:flex; align-items:center; justify-content:flex-end; gap:8px; padding-right:22px; color:#fff; font-weight:700; font-size:15px; }
  .row .behind svg{ width:20px; height:20px; }
  .card{ position:relative; display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:12px 14px; box-shadow:var(--shadow-sm); transition:transform .26s var(--ease); touch-action:pan-y; }

  .check{ flex:0 0 auto; width:27px; height:27px; border-radius:50%; border:2px solid var(--line-strong); display:flex; align-items:center; justify-content:center; background:transparent; transition:background .18s var(--ease), border-color .18s var(--ease); }
  .check svg{ width:15px; height:15px; opacity:0; transform:scale(.3); transition:opacity .18s var(--ease), transform .22s var(--ease); }
  .row.done .check{ background:var(--green); border-color:var(--green); }
  .row.done .check svg{ opacity:1; transform:scale(1); }

  .meta{ flex:1; min-width:0; }
  .nm{ font-size:17px; font-weight:600; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .18s ease; }
  .row.done .nm{ color:var(--ink-faint); text-decoration:line-through; }
  .sub2{ font-size:13px; color:var(--ink-soft); margin-top:1px; display:flex; align-items:center; gap:6px; }
  .sub2 .pill-due{ color:var(--amber); font-weight:700; }

  .qty{ flex:0 0 auto; display:flex; align-items:center; background:var(--surface-3); border-radius:11px; overflow:hidden; }
  .qty button{ width:30px; height:30px; border:0; background:transparent; font-size:18px; color:var(--green); }
  .qty button:active{ background:var(--green-2); }
  .qty span{ min-width:20px; text-align:center; font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }
  .price{ flex:0 0 auto; min-width:58px; text-align:right; font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; }
  .row.done .price{ color:var(--ink-faint); }

  /* Chips (bijna op / quick add) */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); padding:8px 13px; font-size:15px; font-weight:600; box-shadow:var(--shadow-sm); transition:transform .12s var(--ease); }
  .chip:active{ transform:scale(.95); }
  .chip .emoji{ font-size:16px; }
  .chip .plus{ color:var(--green); font-weight:800; font-size:17px; margin-left:1px; }
  .chip.amber{ background:var(--amber-2); border-color:transparent; }
  .chip.amber .plus{ color:var(--amber); }
  .banner{ background:linear-gradient(135deg, var(--amber-2), color-mix(in srgb, var(--amber-2) 60%, var(--surface))); border:1px solid color-mix(in srgb, var(--amber) 22%, transparent); border-radius:var(--r-card); padding:14px; }
  .banner .b-top{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; color:var(--amber); margin-bottom:10px; }
  .banner .b-top svg{ width:17px; height:17px; }

  /* Vaste-tab card */
  .vrow{ display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:13px 14px; box-shadow:var(--shadow-sm); }
  .vrow .vemoji{ flex:0 0 auto; width:40px; height:40px; border-radius:12px; background:var(--green-2); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .vrow .vmeta{ flex:1; min-width:0; }
  .vrow .vname{ font-size:17px; font-weight:600; }
  .vrow .vcad{ font-size:13px; color:var(--ink-soft); margin-top:1px; }
  .vrow .vcad b{ color:var(--amber); }
  .vrow .vadd{ flex:0 0 auto; width:38px; height:38px; border-radius:50%; border:0; background:var(--green); color:var(--on-green); font-size:22px; box-shadow:var(--shadow-sm); transition:transform .12s var(--ease); }
  .vrow .vadd:active{ transform:scale(.9); }
  .vrow.onlist .vadd{ background:var(--surface-3); color:var(--green); }

  /* Empty state */
  .empty{ text-align:center; padding:54px 26px; color:var(--ink-soft); }
  .empty .ico{ width:72px; height:72px; margin:0 auto 16px; border-radius:22px; background:var(--green-2); display:flex; align-items:center; justify-content:center; }
  .empty .ico svg{ width:34px; height:34px; color:var(--green); }
  .empty h2{ font-family:var(--display); font-size:25px; font-weight:600; color:var(--ink); margin:0 0 7px; letter-spacing:-.01em; }
  .empty p{ font-size:15px; margin:0; line-height:1.5; }

  /* ---------- Totals bar ---------- */
  .totals{ position:absolute; left:0; right:0; bottom:calc(var(--tabbar-h) + var(--safe-b)); z-index:25; padding:0 12px 8px; pointer-events:none; transition:opacity .2s ease, transform .2s ease; }
  .totals.hide{ opacity:0; transform:translateY(8px); pointer-events:none; }
  .totals-inner{ background:color-mix(in srgb, var(--surface) 86%, transparent); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow-lg); padding:12px 16px; pointer-events:auto; }
  .trow{ display:flex; align-items:baseline; justify-content:space-between; }
  .trow .lbl{ font-size:13px; font-weight:600; color:var(--ink-soft); }
  .trow .amt{ font-size:28px; font-weight:800; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .t-hint{ font-size:12px; color:var(--ink-faint); margin:4px 0 8px; font-style:italic; }
  .pbar{ height:6px; border-radius:99px; background:var(--surface-3); overflow:hidden; margin:9px 0 6px; }
  .pbar > i{ display:block; height:100%; background:var(--green); border-radius:99px; transition:width .35s var(--ease); }
  .trow .cart{ font-size:13px; font-weight:700; color:var(--green); }
  .finish{ border:0; background:var(--green); color:var(--on-green); font-weight:700; font-size:14px; padding:8px 14px; border-radius:12px; transition:transform .12s var(--ease); }
  .finish:active{ transform:scale(.96); }

  /* ---------- Tab bar ---------- */
  .tabbar{ position:absolute; left:0; right:0; bottom:0; z-index:28; height:calc(var(--tabbar-h) + var(--safe-b)); padding-bottom:var(--safe-b); display:flex; background:color-mix(in srgb, var(--bg) 84%, transparent); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border-top:.5px solid var(--line); }
  .tab{ flex:1; background:transparent; border:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--ink-faint); font-size:11px; font-weight:600; }
  .tab svg{ width:25px; height:25px; transition:transform .15s var(--ease); }
  .tab.active{ color:var(--green); }
  .tab:active svg{ transform:scale(.88); }

  /* ---------- Views ---------- */
  .view{ display:none; }
  .view.active{ display:block; animation:fade .28s var(--ease); }
  @keyframes fade{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }

  /* ---------- Settings (Meer) ---------- */
  .group{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); overflow:hidden; box-shadow:var(--shadow-sm); margin-bottom:18px; }
  .grow{ display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); }
  .grow:last-child{ border-bottom:0; }
  .grow .glabel{ flex:1; font-size:16px; font-weight:500; }
  .grow .gsub{ font-size:13px; color:var(--ink-soft); margin-top:2px; }
  .seg{ display:flex; background:var(--surface-3); border-radius:10px; padding:2px; }
  .seg button{ border:0; background:transparent; padding:6px 12px; border-radius:8px; font-size:14px; font-weight:600; color:var(--ink-soft); }
  .seg button.on{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow-sm); }
  .switch{ width:50px; height:30px; border-radius:99px; background:var(--surface-3); border:0; position:relative; transition:background .2s ease; flex:0 0 auto; }
  .switch.on{ background:var(--green); }
  .switch::after{ content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.3); transition:transform .2s var(--ease); }
  .switch.on::after{ transform:translateX(20px); }
  .mbtn{ width:100%; border:0; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; font-size:16px; font-weight:600; box-shadow:var(--shadow-sm); margin-bottom:10px; }
  .mbtn.danger{ color:var(--red); }
  .mbtn:active{ background:var(--surface-3); }
  textarea.io{ width:100%; height:120px; border:1px solid var(--line); border-radius:14px; background:var(--surface-2); padding:12px; font-size:13px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; resize:none; -webkit-user-select:text; user-select:text; }
  .hint{ font-size:13px; color:var(--ink-soft); line-height:1.5; margin:2px 6px 16px; }

  /* ---------- Bottom sheet ---------- */
  .scrim{ position:absolute; inset:0; background:rgba(0,0,0,.4); opacity:0; z-index:50; transition:opacity .3s var(--ease); pointer-events:none; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:51; background:var(--surface); border-radius:24px 24px 0 0; box-shadow:0 -10px 40px rgba(0,0,0,.25); transform:translateY(110%); transition:transform .36s var(--ease); padding:8px 18px calc(18px + var(--safe-b)); max-width:600px; margin:0 auto; }
  .sheet.show{ transform:none; }
  .grip{ width:40px; height:5px; border-radius:99px; background:var(--line-strong); margin:6px auto 14px; }
  .sheet h3{ font-family:var(--display); font-size:25px; font-weight:600; letter-spacing:-.01em; margin:0 0 16px; }
  .frow{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .frow .fl{ flex:1; font-size:16px; font-weight:500; }
  .sheet input.txt{ flex:1; border:1px solid var(--line); border-radius:12px; background:var(--surface-2); padding:11px 13px; font-size:16px; -webkit-user-select:text; user-select:text; }
  .sheet input.num{ width:96px; text-align:right; border:1px solid var(--line); border-radius:12px; background:var(--surface-2); padding:11px 13px; font-size:16px; font-weight:700; -webkit-user-select:text; user-select:text; }
  .catscroll{ display:flex; gap:8px; overflow-x:auto; padding:2px 0 6px; margin:0 -18px 8px; padding-left:18px; padding-right:18px; }
  .catscroll::-webkit-scrollbar{ display:none; }
  .catchip{ flex:0 0 auto; display:flex; align-items:center; gap:6px; border:1px solid var(--line); background:var(--surface-2); border-radius:var(--r-pill); padding:8px 13px; font-size:14px; font-weight:600; white-space:nowrap; }
  .catchip.on{ background:var(--green); color:var(--on-green); border-color:transparent; }
  .cadrow{ display:flex; gap:8px; flex-wrap:wrap; }
  .cadchip{ border:1px solid var(--line); background:var(--surface-2); border-radius:12px; padding:9px 13px; font-size:14px; font-weight:600; }
  .cadchip.on{ background:var(--amber); color:#fff; border-color:transparent; }
  .sheet-actions{ display:flex; gap:10px; margin-top:18px; }
  .sheet-actions .save{ flex:1; border:0; background:var(--green); color:var(--on-green); border-radius:14px; padding:15px; font-size:17px; font-weight:700; }
  .sheet-actions .del{ flex:0 0 auto; border:1px solid var(--line); background:var(--surface); color:var(--red); border-radius:14px; padding:15px 18px; font-size:17px; font-weight:700; }
  .intro-pt{ display:flex; gap:13px; align-items:flex-start; margin-bottom:15px; font-size:15px; line-height:1.45; color:var(--ink-soft); }
  .intro-pt .ip-em{ font-size:23px; flex:0 0 auto; line-height:1.2; }
  .intro-pt b{ color:var(--ink); font-weight:700; }

  /* ---------- Toast ---------- */
  .toast{ position:absolute; left:50%; bottom:calc(var(--tabbar-h) + var(--safe-b) + 20px); transform:translateX(-50%) translateY(16px); background:var(--ink); color:var(--bg); padding:11px 18px; border-radius:14px; font-size:14px; font-weight:600; opacity:0; z-index:60; pointer-events:none; box-shadow:var(--shadow-lg); transition:opacity .25s var(--ease), transform .25s var(--ease); white-space:nowrap; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- Cloud: list switch, members, share, send ---------- */
  .list-switch{ display:inline-flex; align-items:center; gap:7px; margin-top:8px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); padding:6px 12px 6px 13px; box-shadow:var(--shadow-sm); font-size:14px; font-weight:600; max-width:100%; }
  .list-switch .ls-ico{ font-size:15px; }
  .list-switch .ls-name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .list-switch .ls-chev{ width:16px; height:16px; color:var(--ink-faint); flex:0 0 auto; }
  .members-row{ display:flex; align-items:center; gap:8px; margin:2px 4px 4px; min-height:0; }
  .members-row.empty{ display:none; }
  .avatars{ display:flex; }
  .avatars .av{ width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; border:2px solid var(--bg); margin-left:-8px; }
  .avatars .av:first-child{ margin-left:0; }
  .members-row .share-btn{ margin-left:auto; display:inline-flex; align-items:center; gap:6px; background:var(--green-2); color:var(--green); border:0; border-radius:var(--r-pill); padding:7px 13px; font-size:13px; font-weight:700; }
  .members-row .share-btn svg{ width:15px; height:15px; }

  .ls-item{ display:flex; align-items:center; gap:12px; padding:13px 4px; border-bottom:1px solid var(--line); }
  .ls-item:last-child{ border-bottom:0; }
  .ls-item .lsi-ico{ width:40px; height:40px; border-radius:12px; background:var(--green-2); display:flex; align-items:center; justify-content:center; font-size:19px; flex:0 0 auto; }
  .ls-item .lsi-name{ flex:1; font-size:17px; font-weight:600; }
  .ls-item .lsi-sub{ font-size:13px; color:var(--ink-soft); }
  .ls-item.active .lsi-name{ color:var(--green); }
  .ls-item .lsi-check{ color:var(--green); }

  .code-box{ text-align:center; background:var(--surface-2); border:1px dashed var(--line-strong); border-radius:16px; padding:18px; margin:4px 0 14px; }
  .code-box .cb-lbl{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); }
  .code-box .cb-code{ font-family:var(--display); font-size:40px; font-weight:600; letter-spacing:.18em; margin-top:4px; }

  /* ---------- "Stuur naar"-snelkoppelingen ---------- */
  .shortcuts-row{ margin:-2px -16px 10px; padding:0; }
  .shortcuts-row.empty{ display:none; }
  .shortcuts-row .sc-scroll{ display:flex; gap:8px; overflow-x:auto; padding:4px 16px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; }
  .shortcuts-row .sc-scroll::-webkit-scrollbar{ display:none; }
  .sc-chip{ flex:0 0 auto; display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); padding:7px 13px 7px 9px; font-size:14px; font-weight:600; color:var(--ink); box-shadow:var(--shadow-sm); scroll-snap-align:start; transition:transform .12s var(--ease); }
  .sc-chip:active{ transform:scale(.94); }
  .sc-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  .sc-arrow{ color:var(--ink-faint); font-weight:700; font-size:13px; margin-right:-2px; }
  .sc-name{ white-space:nowrap; max-width:130px; overflow:hidden; text-overflow:ellipsis; }
  .sc-action{ padding:7px 13px; color:var(--green); border-style:dashed; border-color:var(--line-strong); justify-content:center; font-size:15px; font-weight:700; gap:0; }
  .sc-action:active{ background:var(--green-2); }
  .sc-action svg{ width:16px; height:16px; }
  .sc-action-wide{ padding:7px 14px 7px 12px; gap:7px; font-size:14px; font-weight:600; color:var(--green); background:var(--green-2); border-color:transparent; border-style:solid; }
  .sc-action-wide .sc-act-ico{ font-size:16px; font-weight:800; line-height:1; }
  .sc-action-wide svg{ width:15px; height:15px; }
  .sc-action-wide .sc-act-lbl{ white-space:nowrap; }
  .sc-action-wide:active{ filter:brightness(.96); }

  /* ---------- Share-actions sheet (sa-) ---------- */
  .sa-row{ display:flex; align-items:center; gap:14px; width:100%; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow-sm); margin-bottom:10px; text-align:left; }
  .sa-row:active{ background:var(--surface-3); }
  .sa-row:last-child{ margin-bottom:0; }
  .sa-ico{ flex:0 0 auto; width:38px; height:38px; border-radius:50%; background:var(--green-2); color:var(--green); display:flex; align-items:center; justify-content:center; }
  .sa-meta{ flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
  .sa-ttl{ font-size:16px; font-weight:700; color:var(--ink); }

  "dranken":["water","spa","bruiswater","cola","fris","frisdrank","sap","sinaasappelsap","appelsap","limonade","ranja","siroop","ice tea","icetea","thee","groene thee","koffie","koffiebonen","espresso","cappuccino","oploskoffie","bier","wijn","rode wijn","witte wijn","prosecco","energiedrank","red bull","tonic","kombucha","smoothie","chocomel"],
  "huishouden":["wc papier","toiletpapier","wc-papier","keukenrol","vuilniszak","afwasmiddel","afwas","vaatwastablet","vaatwas","wasmiddel","wasverzachter","allesreiniger","schoonmaak","spons","schuurspons","vochtige doekjes","aluminiumfolie","vershoudfolie","bakpapier","batterij","batterijen","lamp","kaars","theelicht","luier","zakdoek","tissue","afwasborstel","vaatwasmiddel"],
  "verzorging":["shampoo","conditioner","zeep","handzeep","douchegel","tandpasta","tandenborstel","floss","deodorant","deo","scheermes","scheerschuim","bodylotion","handcreme","creme","maandverband","tampon","watten","wattenstaafje","mondwater","zonnebrand","vitamine","paracetamol","pleister","verband"]
};
// vlakke lijst {kw, cat}, gesorteerd op lengte aflopend voor specificiteit
var FLAT_KW = [];
Object.keys(KW).forEach(function(cat){ KW[cat].forEach(function(w){ FLAT_KW.push({w:w, cat:cat}); }); });
FLAT_KW.sort(function(a,b){ return b.w.length - a.w.length; });

function norm(s){ return (s||"").toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function lev(a,b){
  var m=a.length,n=b.length; if(Math.abs(m-n)>1) return 2;
  var prev=[],cur=[],i,j;
  for(j=0;j<=n;j++) prev[j]=j;
  for(i=1;i<=m;i++){
    cur[0]=i;
    for(j=1;j<=n;j++){
      var c=a.charAt(i-1)===b.charAt(j-1)?0:1;
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+c);
    }
    for(j=0;j<=n;j++) prev[j]=cur[j];
  }
  return prev[n];
}
function classify(name){
  var n = norm(name);
  if(!n) return "overig";
  var words = n.split(/\s+/);
  for(var i=0;i<FLAT_KW.length;i++){
    var w = FLAT_KW[i].w;
    if(w.length >= 4){
      if(n.indexOf(w) !== -1) return FLAT_KW[i].cat;
    } else {
      if(words.indexOf(w) !== -1) return FLAT_KW[i].cat;
    }
  }
  // typefout-tolerant: 1 teken verschil op een heel woord (min. 5 tekens)
  for(var wi=0;wi<words.length;wi++){
    var word=words[wi]; if(word.length<5) continue;
    for(var k=0;k<FLAT_KW.length;k++){
      var kw=FLAT_KW[k].w;
      if(kw.length<5) continue;
      if(Math.abs(kw.length-word.length)<=1 && lev(word,kw)<=1) return FLAT_KW[k].cat;
    }
  }
  return "overig";
}

// Veelgekochte producten voor autocomplete (geen vaste lijst, alleen suggesties bij typen)
var COMMON = ["Melk","Brood","Eieren","Kaas","Boter","Yoghurt","Kwark","Karnemelk","Slagroom","Kipfilet","Gehakt","Zalm","Tonijn","Ham","Salami","Bananen","Appels","Sinaasappels","Druiven","Citroen","Tomaten","Komkommer","Sla","Paprika","Avocado","Aardappels","Uien","Knoflook","Wortels","Broccoli","Spinazie","Champignons","Courgette","Pasta","Spaghetti","Rijst","Couscous","Bloem","Suiker","Zout","Olijfolie","Azijn","Pastasaus","Tomatenblokjes","Kokosmelk","Kidneybonen","Linzen","Soep","Pindakaas","Hagelslag","Jam","Honing","Muesli","Havermout","Cornflakes","Koffie","Thee","Water","Spa","Cola","Sinaasappelsap","Bier","Wijn","Chips","Chocolade","Stroopwafels","Crackers","Beschuit","Croissants","Stokbrood","Mozzarella","Feta","Pizza","IJs","Mayonaise","Ketchup","Mosterd","Wc-papier","Keukenrol","Vuilniszakken","Afwasmiddel","Wasmiddel","Allesreiniger","Shampoo","Tandpasta","Deodorant"];

/* ============================================================
   STORE — localStorage + migratie
   ============================================================ */
var NS = "mandje.v2";
var DEFAULTS = {
  version:2,
  settings:{ theme:"auto", showPrices:false, seenIntro:false, categoryOrder:CATS.map(function(c){return c.id;}), minPurchases:3, cvThreshold:0.6, dueWindowDays:1 },
  list:[],
  catalog:{}
};

var state = null;

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

function load(){
  var raw = null, parsed = null;
  try{ raw = localStorage.getItem(NS); }catch(e){}
  if(raw){
    try{ parsed = JSON.parse(raw); }catch(e){ parsed = null; }
  }
  if(parsed && typeof parsed === "object"){
    state = Object.assign(deepClone(DEFAULTS), parsed);
    state.settings = Object.assign(deepClone(DEFAULTS.settings), state.settings||{});
    if(!Array.isArray(state.list)) state.list=[];
    if(!state.catalog || typeof state.catalog!=="object") state.catalog={};
    if(!Array.isArray(state.settings.categoryOrder)) state.settings.categoryOrder = DEFAULTS.settings.categoryOrder.slice();
    CATS.forEach(function(c){ if(state.settings.categoryOrder.indexOf(c.id)===-1) state.settings.categoryOrder.push(c.id); });
    return;
  }
  // geen geldige v2-data → eenmalige migratie vanaf v1
  state = deepClone(DEFAULTS);
  try{
    var oldItems = JSON.parse(localStorage.getItem("mandje.items.v1")||"null");
    if(Array.isArray(oldItems)){
      oldItems.forEach(function(it){
        state.list.push({ id:uid(), name:it.name, category:classify(it.name), qty:it.qty||1, price:(it.price==null?null:it.price), note:"", done:!!it.done, addedAt:nowISO() });
        touchCatalog(it.name, it.price);
      });
    }
  }catch(e){}
  save();
}

function save(){
  try{ localStorage.setItem(NS, JSON.stringify(state)); }catch(e){}
}

/* ============================================================
   CATALOG — leer-database per product
   ============================================================ */
function touchCatalog(name, price){
  var k = norm(name);
  if(!k) return null;
  var e = state.catalog[k];
  if(!e){
    e = { name:name.trim(), category:classify(name), defaultPrice:(price==null?null:price), purchaseDates:[], timesAdded:0, lastAddedAt:null, cadenceMode:"auto", manualIntervalDays:null };
    state.catalog[k]=e;
  }
  e.name = name.trim();
  if(price!=null) e.defaultPrice = price;
  e.timesAdded = (e.timesAdded||0)+1;
  e.lastAddedAt = nowISO();
  return e;
}

function recordPurchase(name, price){
  var k = norm(name); var e = state.catalog[k];
  if(!e){ e = touchCatalog(name, price); }
  var today = todayStr();
  e.purchaseDates = e.purchaseDates||[];
  // niet dubbel op dezelfde dag
  if(e.purchaseDates[e.purchaseDates.length-1] !== today) e.purchaseDates.push(today);
  if(price!=null) e.defaultPrice = price;
}

/* ============================================================
   CADENCE — analyse + due-detectie
   ============================================================ */
function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){ return (n<10?"0":"")+n; }
function parseDay(s){ return new Date(s+"T00:00:00"); }
function dayDiff(a,b){ return Math.round((b-a)/86400000); }
function addDays(d,n){ return new Date(d.getTime()+n*86400000); }
function nowISO(){ return new Date().toISOString(); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function analyse(e){
  var s = state.settings;
  var ds = (e.purchaseDates||[]).slice().sort();
  var last = ds.length ? parseDay(ds[ds.length-1]) : null;
  var today = parseDay(todayStr());

  if(e.cadenceMode === "off"){ return {mode:"off", regular:false, last:last}; }

  if(e.cadenceMode === "manual" && e.manualIntervalDays){
    var iv = e.manualIntervalDays;
    var next = last ? addDays(last, iv) : today;
    var overdue = last ? (dayDiff(next, today))/iv : 1;
    return { mode:"manual", interval:iv, mean:iv, last:last, next:next, overdue:overdue, regular:true };
  }

  if(ds.length < 2){ return { mode:"auto", regular:false, last:last, count:ds.length }; }
  var gaps=[]; for(var i=1;i<ds.length;i++){ gaps.push(dayDiff(parseDay(ds[i-1]), parseDay(ds[i]))); }
  var mean = gaps.reduce(function(a,b){return a+b;},0)/gaps.length;
  var variance = gaps.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/gaps.length;
  var sd = Math.sqrt(variance);
  var cv = mean ? sd/mean : Infinity;
  var nextA = addDays(last, mean);
  var overdueA = mean ? (dayDiff(nextA, today))/mean : 0;
  var regular = (ds.length >= s.minPurchases) && (cv < s.cvThreshold) && mean >= 1;
  return { mode:"auto", mean:mean, cv:cv, last:last, next:nextA, overdue:overdueA, regular:regular, count:ds.length };
}

function isDue(a){
  if(!a.regular || !a.next) return false;
  var today = parseDay(todayStr());
  var threshold = addDays(a.next, -state.settings.dueWindowDays);
  return today.getTime() >= threshold.getTime();
}

// items die "bijna op" zijn en nog niet open op de lijst staan
function getDueItems(){
  var openKeys = {};
  state.list.forEach(function(it){ if(!it.done) openKeys[norm(it.name)]=true; });
  var out=[];
  Object.keys(state.catalog).forEach(function(k){
    if(openKeys[k]) return;
    var e=state.catalog[k]; var a=analyse(e);
    if(isDue(a)) out.push({key:k, e:e, a:a});
  });
  out.sort(function(x,y){ return y.a.overdue - x.a.overdue; });
  return out;
}

// alle "vaste" producten (handmatig of automatisch herkend als regelmatig)
function getRecurring(){
  var out=[];
  Object.keys(state.catalog).forEach(function(k){
    var e=state.catalog[k]; var a=analyse(e);
    var recurring = (a.mode==="manual") || (a.mode==="auto" && a.regular);
    if(recurring) out.push({key:k, e:e, a:a});
  });
  // due eerst, dan op naam
  out.sort(function(x,y){
    var dx=isDue(x.a)?1:0, dy=isDue(y.a)?1:0;
    if(dx!==dy) return dy-dx;
    return x.e.name.localeCompare(y.e.name,"nl");
  });
  return out;
}

function cadenceLabel(a){
  if(a.mode==="manual"){
    if(a.interval===7) return "Elke week";
    if(a.interval===14) return "Elke 2 weken";
    if(a.interval>=28 && a.interval<=31) return "Elke maand";
    return "Elke "+a.interval+" dagen";
  }
  if(a.mode==="auto" && a.regular){
    var n=Math.round(a.mean);
    if(n<=8 && n>=6) return "Meestal wekelijks";
    if(n>=13 && n<=15) return "Meestal 2-wekelijks";
    if(n>=28 && n<=31) return "Meestal maandelijks";
    return "Meestal elke ~"+n+" dagen";
  }
  return "";
}
function lastSeenLabel(a){
  if(!a.last) return "";
  var d = dayDiff(a.last, parseDay(todayStr()));
  if(d<=0) return "vandaag gekocht";
  if(d===1) return "gisteren gekocht";
  return d+" dagen geleden gekocht";
}

/* ============================================================
   FORMATTERS
   ============================================================ */
function euro(n){ return "€"+(n||0).toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function parsePrice(str){
  if(str==null || str==="") return null;
  str = String(str).replace(/[^0-9,.\-]/g,"").replace(/\./g,".").replace(",",".");
  // herstel: laatste punt is decimaal
  var n = parseFloat(str);
  return isNaN(n)?null:n;
}
function $(s){ return document.querySelector(s); }
function el(tag, cls, html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function vibrate(ms){ if(navigator.vibrate){ try{navigator.vibrate(ms);}catch(e){} } }

var CHECK_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="var(--on-green)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

/* ============================================================
   TOAST
   ============================================================ */
var toastT;
function toast(msg){
  var t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove("show"); },1500);
}

/* ============================================================
   LIJST — acties
   ============================================================ */
function addToList(name, price, opts){
  name=(name||"").trim(); if(!name) return false;
  opts=opts||{};
  if(Cloud.active){ Cloud.addItem(name, (state.settings.showPrices?price:null)); touchCatalog(name, price); save(); return true; }
  var k=norm(name);
  var existing = state.list.find(function(i){ return !i.done && norm(i.name)===k; });
  if(existing){ existing.qty+=1; if(price!=null) existing.price=price; }
  else{
    var cat = (state.catalog[k] && state.catalog[k].category) || classify(name);
    var defPrice = price!=null ? price : (state.catalog[k] ? state.catalog[k].defaultPrice : null);
    state.list.unshift({ id:uid(), name:name, category:cat, qty:1, price:(state.settings.showPrices?defPrice:null), note:"", done:false, addedAt:nowISO() });
  }
  touchCatalog(name, price);
  save(); renderLijst(); renderDueBanner();
  return true;
}
function toggleDone(id){
  if(Cloud.active){ Cloud.toggle(id); vibrate(8); return; }
  var it=state.list.find(function(i){return i.id===id;}); if(!it) return;
  it.done=!it.done; if(it.done) vibrate(8);
  save(); renderLijst();
}
function setQty(id,delta){
  if(Cloud.active){ Cloud.qty(id,delta); return; }
  var it=state.list.find(function(i){return i.id===id;}); if(!it) return;
  it.qty=Math.max(1,it.qty+delta); save(); renderLijst();
}
function removeFromList(id){
  if(Cloud.active){ Cloud.remove(id); return; }
  state.list=state.list.filter(function(i){return i.id!==id;}); save(); renderLijst(); renderDueBanner();
}
function finishShopping(){
  if(Cloud.active){ Cloud.finish(); return; }
  var done=state.list.filter(function(i){return i.done;});
  if(!done.length) return;
  done.forEach(function(it){ recordPurchase(it.name, it.price); });
  state.list=state.list.filter(function(i){return !i.done;});
  save(); renderLijst(); renderDueBanner(); renderVaste();
  toast(done.length+(done.length===1?" boodschap gekocht":" boodschappen gekocht"));
  vibrate(12);
}

/* ============================================================
   RENDER — Lijst-tab
   ============================================================ */
function renderLijst(){
  var open = state.list.filter(function(i){return !i.done;});
  var done = state.list.filter(function(i){return i.done;});
  var openWrap=$("#open-list"); openWrap.innerHTML="";
  var doneWrap=$("#done-list"); doneWrap.innerHTML="";

  if(state.list.length===0){
    openWrap.appendChild(emptyState("bag","Leeg mandje","Typ hierboven wat je nodig hebt. Producten landen vanzelf in het juiste schap."));
  } else {
    // groepeer open per categorie volgens categoryOrder
    var byCat={}; open.forEach(function(it){ (byCat[it.category]=byCat[it.category]||[]).push(it); });
    state.settings.categoryOrder.forEach(function(cid){
      var arr=byCat[cid]; if(!arr || !arr.length) return;
      var c=CAT_BY_ID[cid]||CAT_BY_ID["overig"];
      var sec=el("div","section");
      sec.innerHTML='<span class="cat-emoji">'+c.glyph+'</span><span>'+c.label+'</span><span class="count">'+arr.length+'</span>';
      openWrap.appendChild(sec);
      var ul=el("ul","list");
      arr.forEach(function(it){ ul.appendChild(itemRow(it)); });

    });

function itemRow(it){
  var li=el("li","row"+(it.done?" done":""));
  li.appendChild(el("div","behind",'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg><span>Verwijder</span>'));
  var card=el("div","card");

  var a = state.catalog[norm(it.name)] ? analyse(state.catalog[norm(it.name)]) : null;
  var sub="";
  if(it.note) sub+='<span>'+escapeHtml(it.note)+'</span>';
  if(state.settings.showPrices && it.price!=null) sub+=(sub?' · ':'')+'<span>'+euro(it.price)+(it.qty>1?' × '+it.qty:'')+'</span>';
  if(Cloud.active){
    var asg = it.assigned_to ? Cloud.memberById(it.assigned_to) : null;
    if(asg) sub+=(sub?' · ':'')+'<span style="color:'+asg.color+';font-weight:700">→ '+escapeHtml(asg.display_name)+'</span>';
    else if(it.added_by_name) sub+=(sub?' · ':'')+'<span style="color:var(--ink-faint)">+ '+escapeHtml(it.added_by_name)+'</span>';
  }

  card.innerHTML =
    '<div class="check">'+CHECK_SVG+'</div>'+
    '<div class="meta"><div class="nm"></div>'+(sub?'<div class="sub2">'+sub+'</div>':'')+'</div>'+
    '<div class="qty"><button class="q-minus" aria-label="minder">–</button><span>'+it.qty+'</span><button class="q-plus" aria-label="meer">+</button></div>'+
    (state.settings.showPrices && it.price!=null ? '<div class="price">'+euro(it.price*it.qty)+'</div>' : '');
  card.querySelector(".nm").textContent=it.name;

  card.querySelector(".check").addEventListener("click",function(e){ e.stopPropagation(); toggleDone(it.id); });
  card.querySelector(".q-minus").addEventListener("click",function(e){ e.stopPropagation(); setQty(it.id,-1); });
  card.querySelector(".q-plus").addEventListener("click",function(e){ e.stopPropagation(); setQty(it.id,1); });
  card.addEventListener("click",function(){ if(card._suppressClick) return; openSheet(it.id); });

  li.appendChild(card);
  attachSwipe(card, function(){ removeFromList(it.id); });
  return li;
}

function updateTotals(){
  var total=0, cart=0, hasPrices=false;
  state.list.forEach(function(i){ var v=(i.price||0)*i.qty; total+=v; if(i.done) cart+=v; if(i.price!=null) hasPrices=true; });
  var done=state.list.filter(function(i){return i.done;}).length;
  $("#t-total").textContent=euro(total);
  $("#t-cart").textContent=euro(cart)+" in mandje";
  $("#t-prog").style.width=(total>0?Math.round(cart/total*100):0)+"%";
  $("#t-finish").style.display=done?"inline-flex":"none";
  var hint=$("#t-hint"); if(hint) hint.style.display=(state.settings.showPrices && !hasPrices && state.list.length>0)?"block":"none";
  var progWrap=$("#t-prog-wrap"); if(progWrap) progWrap.style.display=hasPrices?"block":"none";
  var show = activeTab==="lijst" && state.list.length>0 && state.settings.showPrices;
  $("#totals").classList.toggle("hide", !show);
  $("#pad-lijst").className = "pad-bottom"+(show?" with-total":"");
}

function updateSubhead(){
  if(activeTab!=="lijst") return;
  var open=state.list.filter(function(i){return !i.done;}).length;
  var done=state.list.filter(function(i){return i.done;}).length;
  $("#subhead").textContent = state.list.length===0 ? "Niets op de lijst" : (open+" te halen · "+done+" in mandje");
}

function sectionLabel(glyph,label,count){
  var s=el("div","section"); s.innerHTML='<span class="cat-emoji">'+glyph+'</span><span>'+label+'</span><span class="count">'+count+'</span>'; return s;

function vasteRow(r){

/* ---------- Export / import (bestand) ---------- */
function exportFile(){
  try{
    var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download="mandje-backup.json"; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },500);
    toast("Bestand geëxporteerd");
  }catch(e){ toast("Exporteren lukte niet"); }
}
function importFromFile(){
  var inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
  inp.addEventListener("change",function(){
    var f=inp.files&&inp.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var data=JSON.parse(r.result);
        if(!data || typeof data!=="object" || !("catalog" in data)) throw new Error("ongeldig");
        state=Object.assign(deepClone(DEFAULTS),data);
        state.settings=Object.assign(deepClone(DEFAULTS.settings),data.settings||{});
        save(); applyTheme(); applyPriceVisibility();
        renderLijst(); renderDueBanner(); renderVaste(); renderMeer();
        toast("Back-up hersteld");
      }catch(e){ toast("Kon bestand niet lezen"); }
    };
    r.readAsText(f);
  });
  inp.click();
}

/* ============================================================
   BOTTOM SHEET
   ============================================================ */
var sheetCtx=null; // {type:'list'|'catalog', id|key}

function openSheet(listId){
  var it=state.list.find(function(i){return i.id===listId;}); if(!it) return;
  var k=norm(it.name);
  var e=state.catalog[k]; var a=e?analyse(e):null;
  sheetCtx={type:"list", id:listId, key:k};
  buildSheet({ name:it.name, qty:it.qty, price:it.price, note:it.note, category:it.category, assigned_to:it.assigned_to||null, cadenceMode:e?e.cadenceMode:"auto", manualIntervalDays:e?e.manualIntervalDays:null, a:a });
}
function openSheetForCatalog(key){
  var e=state.catalog[key]; if(!e) return; var a=analyse(e);
  sheetCtx={type:"catalog", key:key};
  buildSheet({ name:e.name, qty:null, price:e.defaultPrice, note:"", category:e.category, cadenceMode:e.cadenceMode, manualIntervalDays:e.manualIntervalDays, a:a, catalogOnly:true });
}

function buildSheet(d){
  var sheet=$("#sheet");
  var cadMode = d.cadenceMode || "auto";
  var manual = d.manualIntervalDays;
  var selCad = (cadMode==="off")?"off":(cadMode==="manual"? ("m"+manual) : "auto");

  var statusLine="";
  if(d.a){
    if(d.a.mode==="auto" && d.a.regular) statusLine=cadenceLabel(d.a)+" · "+lastSeenLabel(d.a);
    else if(d.a.mode==="manual") statusLine=cadenceLabel(d.a)+(d.a.last?(" · "+lastSeenLabel(d.a)):"");
    else if(d.a.count) statusLine="Nog "+(state.settings.minPurchases-d.a.count)+"× kopen voor een automatisch ritme";
  }

  var html='<div class="grip"></div><h3></h3>';

  if(!d.catalogOnly){
    html+='<div class="frow"><div class="fl">Aantal</div><div class="qty" style="background:var(--surface-2);border:1px solid var(--line)"><button class="s-qminus">–</button><span id="s-qty">'+d.qty+'</span><button class="s-qplus">+</button></div></div>';
    if(state.settings.showPrices){
      html+='<div class="frow"><div class="fl">Prijs</div><input class="num" id="s-price" inputmode="decimal" placeholder="0,00" value="'+(d.price!=null?String(d.price).replace(".",","):"")+'"></div>';
    }
    html+='<div class="frow"><div class="fl">Notitie</div><input class="txt" id="s-note" placeholder="bijv. 1 liter, merk…" value="'+escapeAttr(d.note||"")+'"></div>';
  }

  var showAssign = (!d.catalogOnly && Cloud.active && Cloud.members.length>0);
  if(showAssign){
    html+='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin:6px 6px 8px">Wie haalt het?</div>';
    html+='<div class="cadrow" id="s-assign"><button class="cadchip'+(!d.assigned_to?" on":"")+'" data-m="">Niemand</button>';
    Cloud.members.forEach(function(m){
      html+='<button class="cadchip'+(d.assigned_to===m.id?" on":"")+'" data-m="'+m.id+'" style="'+(d.assigned_to===m.id?'background:'+m.color+';border-color:transparent':'')+'">'+escapeHtml(m.display_name)+'</button>';
    });
    html+='</div>';
  }

  html+='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin:6px 6px 8px">Schap</div>';
  html+='<div class="catscroll" id="s-cats"></div>';

  html+='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin:10px 6px 8px">Herinner me — vaste boodschap</div>';
  if(statusLine) html+='<div class="hint" style="margin:0 6px 10px">'+statusLine+'</div>';
  html+='<div class="cadrow" id="s-cad">'+
        cadChip("auto","Automatisch",selCad)+
        cadChip("m7","Wekelijks",selCad)+
        cadChip("m14","2-wekelijks",selCad)+
        cadChip("m30","Maandelijks",selCad)+
        cadChip("off","Uit",selCad)+
        '</div>';

  html+='<div class="sheet-actions">'+
        '<button class="save" id="s-save">'+(d.catalogOnly?"Opslaan":"Klaar")+'</button>'+
        (d.catalogOnly?'':'<button class="del" id="s-del">Verwijder</button>')+
        '</div>';

  sheet.innerHTML=html;
  sheet.querySelector("h3").textContent=d.name;

  // categorie-chips
  var catWrap=sheet.querySelector("#s-cats");
  var chosenCat=d.category||"overig";
  CATS.forEach(function(c){
    var b=el("button","catchip"+(c.id===chosenCat?" on":""),'<span>'+c.glyph+'</span><span>'+c.label+'</span>');
    b.addEventListener("click",function(){ chosenCat=c.id; catWrap.querySelectorAll(".catchip").forEach(function(x){x.classList.remove("on");}); b.classList.add("on"); });
    catWrap.appendChild(b);
  });

  // cadans-chips
  var chosenCad=selCad;
  sheet.querySelectorAll("#s-cad .cadchip").forEach(function(b){
    b.addEventListener("click",function(){ chosenCad=b.dataset.v; sheet.querySelectorAll("#s-cad .cadchip").forEach(function(x){x.classList.remove("on");}); b.classList.add("on"); });
  });

  // toewijzing-chips (cloud)
  var chosenAssignee = d.assigned_to || null;
  if(showAssign){
    sheet.querySelectorAll("#s-assign .cadchip").forEach(function(b){
      b.addEventListener("click",function(){
        chosenAssignee = b.dataset.m || null;
        sheet.querySelectorAll("#s-assign .cadchip").forEach(function(x){ x.classList.remove("on"); x.style.background=""; x.style.borderColor=""; });
        b.classList.add("on");
        if(chosenAssignee){ var m=Cloud.memberById(chosenAssignee); if(m){ b.style.background=m.color; b.style.borderColor="transparent"; } }
      });
    });
  }

  // qty
  var qty=d.qty;
  if(!d.catalogOnly){
    sheet.querySelector(".s-qminus").addEventListener("click",function(){ qty=Math.max(1,qty-1); sheet.querySelector("#s-qty").textContent=qty; });
    sheet.querySelector(".s-qplus").addEventListener("click",function(){ qty+=1; sheet.querySelector("#s-qty").textContent=qty; });
    var del=sheet.querySelector("#s-del");
    if(del) del.addEventListener("click",function(){ if(sheetCtx.type==="list") removeFromList(sheetCtx.id); closeSheet(); });
  }

  sheet.querySelector("#s-save").addEventListener("click",function(){
    var price = state.settings.showPrices ? parsePrice((sheet.querySelector("#s-price")||{}).value) : null;
    var note = (sheet.querySelector("#s-note")||{}).value || "";
    saveSheet(chosenCat, chosenCad, qty, price, note, d.catalogOnly, chosenAssignee);
  });

  openSheetUI();
}

function cadChip(v,label,sel){ return '<button class="cadchip'+(sel===v?" on":"")+'" data-v="'+v+'">'+label+'</button>'; }

function saveSheet(cat, cad, qty, price, note, catalogOnly, assignee){
  var key = sheetCtx.key;
  // categorie + cadans naar (lokale) catalog — cadans blijft persoonlijk
  var e = state.catalog[key];
  if(!e){ e = touchCatalog(sheetCtx.type==="list" ? (state.list.find(function(i){return i.id===sheetCtx.id;})||{}).name : key, price); e.timesAdded=Math.max(0,(e.timesAdded||1)-1); }
  if(e){
    e.category = cat;
    if(cad==="auto"){ e.cadenceMode="auto"; e.manualIntervalDays=null; }
    else if(cad==="off"){ e.cadenceMode="off"; e.manualIntervalDays=null; }
    else { e.cadenceMode="manual"; e.manualIntervalDays=parseInt(cad.slice(1),10); }
    if(price!=null) e.defaultPrice=price;
  }
  save();
  if(Cloud.active && !catalogOnly && sheetCtx.type==="list"){
    Cloud.setFields(sheetCtx.id, { category:cat, qty:qty, price:(state.settings.showPrices?price:null), note:note, assigned_to:(assignee||null) });
    closeSheet(); renderVaste(); toast("Opgeslagen"); return;
  }
  if(!catalogOnly && sheetCtx.type==="list"){
    var it=state.list.find(function(i){return i.id===sheetCtx.id;});
    if(it){ it.category=cat; it.qty=qty; it.price=(state.settings.showPrices?price:it.price); it.note=note; }
  }
  closeSheet();
  renderLijst(); renderDueBanner(); renderVaste();
  toast("Opgeslagen");
}

/* ============================================================
   SWIPE-TO-DELETE
   ============================================================ */
function attachSwipe(card,onDelete){
  var startX=0,startY=0,curX=0,dragging=false,decided=false,horiz=false;
  var THRESH=78, MAX=92;
  card.addEventListener("touchstart",function(e){
    startX=e.touches[0].clientX; startY=e.touches[0].clientY; curX=0; dragging=true; decided=false; horiz=false;
    card.style.transition="none"; card._suppressClick=false;
  },{passive:true});
  card.addEventListener("touchmove",function(e){
    if(!dragging) return;
    var dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
    if(!decided){ if(Math.abs(dx)>8||Math.abs(dy)>8){ decided=true; horiz=Math.abs(dx)>Math.abs(dy); } }
    if(horiz){ e.preventDefault(); curX=Math.min(0,Math.max(-MAX,dx)); card.style.transform="translateX("+curX+"px)"; if(curX<-6) card._suppressClick=true; }
  },{passive:false});
  card.addEventListener("touchend",function(){
    if(!dragging) return; dragging=false; card.style.transition="";
    if(curX<=-THRESH){ card.style.transform="translateX(-100%)"; vibrate(10); setTimeout(onDelete,180); }
    else{ card.style.transform="translateX(0)"; setTimeout(function(){ card._suppressClick=false; },60); }
  });
}

function doAdd(){
  var name=$("#add-name").value;
  if(addToList(name,null)){

    hideAC(); $("#add-name").focus();
  }
}
function buildAC(q){
  var nq=norm(q);
  if(!nq){ hideAC(); return; }
  var seen={}, results=[];
  // catalog eerst (eigen historie), gerangschikt
  Object.keys(state.catalog).map(function(k){ return state.catalog[k]; })
    .filter(function(e){ return norm(e.name).indexOf(nq)!==-1; })
    .sort(function(a,b){ return (b.timesAdded||0)-(a.timesAdded||0); })
    .forEach(function(e){ var k=norm(e.name); if(!seen[k]){ seen[k]=1; results.push({name:e.name,cat:e.category,own:true}); } });
  // dan COMMON
  COMMON.filter(function(n){ return norm(n).indexOf(nq)!==-1; })
    .forEach(function(n){ var k=norm(n); if(!seen[k]){ seen[k]=1; results.push({name:n,cat:classify(n),own:false}); } });

  results=results.slice(0,6);
  var list=$("#ac-list");
  if(!results.length){ hideAC(); return; }
  list.innerHTML="";
  results.forEach(function(r){
    var c=CAT_BY_ID[r.cat]||CAT_BY_ID["overig"];
    var row=el("div","ac-item",'<span class="ac-emoji">'+c.glyph+'</span><span class="ac-name">'+escapeHtml(r.name)+'</span><span class="ac-add">+</span>');
    row.addEventListener("click",function(){
      addToList(r.name, null);
      $("#add-name").value=""; hideAC(); $("#add-name").focus();
    });
    list.appendChild(row);
  });
  list.classList.add("show");
}
function hideAC(){ $("#ac-list").classList.remove("show"); $("#ac-list").innerHTML=""; }

  if(t==="auto") return (mq && mq.matches)?"dark":"light";

  var eff=effectiveTheme();

  var m=document.querySelector('meta[name="theme-color"][data-active]');
  if(!m){ m=document.createElement("meta"); m.name="theme-color"; m.setAttribute("data-active","1"); document.head.appendChild(m); }

}

/* ============================================================
   CLOUD — gedeelde lijsten via Supabase
   ============================================================ */
/* >>> Sleutels staan in het config-blok bovenaan mandje.html (window.MANDJE_CONFIG) <<< */
var SUPABASE_URL = (window.MANDJE_CONFIG && window.MANDJE_CONFIG.SUPABASE_URL) || "";
var SUPABASE_ANON_KEY = (window.MANDJE_CONFIG && window.MANDJE_CONFIG.SUPABASE_ANON_KEY) || "";

var MEMBER_COLORS = ["#2F7A4F","#3D8BFF","#E0772E","#9B5DE5","#E5446D","#1FB6A8","#C9A227","#E07A5F"];
function pickColor(){ return MEMBER_COLORS[Math.floor(Math.random()*MEMBER_COLORS.length)]; }
function initials(name){
  name=(name||"").trim(); if(!name) return "?";
  var p=name.split(/\s+/);
  return (p.length>1 ? (p[0][0]+p[1][0]) : name.slice(0,2)).toUpperCase();
}

var Cloud = {
  enabled:false, sb:null, ready:false,
  me:null, userId:null,
  lists:[], active:null, members:[], channel:null, presenceTimer:null,

  cfg:function(){ return !!(SUPABASE_URL && SUPABASE_ANON_KEY); },

  loadMe:function(){
    try{ this.me=JSON.parse(localStorage.getItem("mandje.me")||"null"); }catch(e){}
    if(!this.me) this.me={display_name:"", color:pickColor()};
  },
  saveMe:function(){ try{ localStorage.setItem("mandje.me", JSON.stringify(this.me)); }catch(e){} },
  myName:function(){ return (this.me && this.me.display_name) || "Ik"; },
  memberById:function(id){ for(var i=0;i<this.members.length;i++) if(this.members[i].id===id) return this.members[i]; return null; },
  listById:function(id){ for(var i=0;i<this.lists.length;i++) if(this.lists[i].id===id) return this.lists[i]; return null; },
  activeList:function(){ return this.active ? this.listById(this.active) : null; },

  init:async function(){
    if(!this.cfg()) return;
    this.enabled=true; this.loadMe();
    Shortcuts.load();
    var params=new URLSearchParams(location.search);
    try{
      var mod=await import("https://esm.sh/@supabase/supabase-js@2");
      this.sb=mod.createClient(SUPABASE_URL, SUPABASE_ANON_KEY,
        {auth:{persistSession:true, autoRefreshToken:true, storageKey:"mandje.sb.auth"}});
      var s=await this.sb.auth.getSession();
      if(!s.data || !s.data.session){ var r=await this.sb.auth.signInAnonymously(); if(r.error) throw r.error; }
      var u=await this.sb.auth.getUser(); this.userId=(u.data&&u.data.user)?u.data.user.id:null;
      this.ready=true;

      // Publieke stuur-pagina?
      if(params.get("send")){ openSendScreen(params.get("send")); return; }

      await this.loadLists();
      if(params.get("join")){ await ensureIdentity(function(){ Cloud.joinList(params.get("join")); }); }
      else{
        var act=localStorage.getItem("mandje.activeList");
        if(act && act!=="local" && this.listById(act)) await this.open(act);
      }
    }catch(e){ console.warn("Cloud init:", e); this.ready=false; }
    renderListSwitch(); renderMembersRow(); renderShortcutsRow();
  },

  loadLists:async function(){
    var r=await this.sb.from("lists").select("*").order("created_at",{ascending:true});
    if(r.error){ console.warn(r.error); return; }
    this.lists=r.data||[];
  },

  open:async function(listId){
    this.active=listId; try{ localStorage.setItem("mandje.activeList", listId); }catch(e){}
    await this.refreshItems(); await this.refreshMembers();
    this.subscribe(listId); this.startPresence();
    applyListHeader(); renderListSwitch(); renderMembersRow();
  },
  openLocal:function(){
    this.active=null; try{ localStorage.setItem("mandje.activeList","local"); }catch(e){}
    this.stop();
    load(); applyListHeader(); renderListSwitch(); renderMembersRow();
    renderLijst(); renderDueBanner();
  },
  stop:function(){
    if(this.channel){ try{ this.sb.removeChannel(this.channel); }catch(e){} this.channel=null; }
    if(this.presenceTimer){ clearInterval(this.presenceTimer); this.presenceTimer=null; }
  },

  refreshItems:async function(){
    if(!this.active) return;
    var r=await this.sb.from("items").select("*").eq("list_id",this.active).order("created_at",{ascending:false});
    if(r.error){ console.warn(r.error); return; }
    state.list=(r.data||[]).map(function(it){ return {
      id:it.id, name:it.name, category:it.category||classify(it.name), qty:it.qty||1,
      price:(it.price==null?null:Number(it.price)), note:it.note||"", done:!!it.done,
      assigned_to:it.assigned_to||null, added_by_name:it.added_by_name||"", addedAt:it.created_at
    };});
    if(activeTab==="lijst"){ renderLijst(); renderDueBanner(); }
  },
  refreshMembers:async function(){
    if(!this.active) return;
    var r=await this.sb.from("members").select("*").eq("list_id",this.active).order("created_at",{ascending:true});
    if(r.error){ console.warn(r.error); return; }
    this.members=r.data||[];
    renderMembersRow();
  },

  subscribe:function(listId){
    if(this.channel){ try{ this.sb.removeChannel(this.channel); }catch(e){} }
    var self=this;
    this.channel=this.sb.channel("list-"+listId)
      .on("postgres_changes",{event:"*",schema:"public",table:"items",filter:"list_id=eq."+listId}, function(){ self.refreshItems(); })
      .on("postgres_changes",{event:"*",schema:"public",table:"members",filter:"list_id=eq."+listId}, function(){ self.refreshMembers(); })
      .subscribe();
  },
  startPresence:function(){
    var self=this;
    var beat=function(){ if(self.active&&self.userId) self.sb.from("members").update({last_seen:new Date().toISOString()}).eq("list_id",self.active).eq("user_id",self.userId).then(function(){},function(){}); };
    beat(); if(this.presenceTimer) clearInterval(this.presenceTimer);
    this.presenceTimer=setInterval(beat,60000);
  },

  /* ---- mutaties (optimistisch; realtime reconcilieert) ---- */
  addItem:function(name, price){
    name=(name||"").trim(); if(!name||!this.active) return;
    var cat=(state.catalog[norm(name)]&&state.catalog[norm(name)].category)||classify(name);
    state.list.unshift({ id:"tmp_"+uid(), name:name, category:cat, qty:1, price:price, note:"", done:false, assigned_to:null, added_by_name:this.myName(), addedAt:nowISO() });
    renderLijst();
    this.sb.from("items").insert({list_id:this.active, name:name, category:cat, qty:1, price:(price==null?null:price), added_by_name:this.myName()}).then(function(r){ if(r.error) toast("Toevoegen mislukt"); },function(){});
  },
  toggle:function(id){
    var it=state.list.find(function(i){return i.id===id;}); if(!it) return;
    var nd=!it.done; it.done=nd; renderLijst();
    this.sb.from("items").update({done:nd, done_by_name:(nd?this.myName():null)}).eq("id",id).then(function(){},function(){});
  },
  qty:function(id,delta){
    var it=state.list.find(function(i){return i.id===id;}); if(!it) return;
    it.qty=Math.max(1,it.qty+delta); renderLijst();
    this.sb.from("items").update({qty:it.qty}).eq("id",id).then(function(){},function(){});
  },
  remove:function(id){
    state.list=state.list.filter(function(i){return i.id!==id;}); renderLijst();
    this.sb.from("items").delete().eq("id",id).then(function(){},function(){});
  },
  setFields:function(id, fields){
    var it=state.list.find(function(i){return i.id===id;});
    if(it){ if("qty"in fields)it.qty=fields.qty; if("price"in fields)it.price=fields.price; if("note"in fields)it.note=fields.note; if("category"in fields)it.category=fields.category; if("assigned_to"in fields)it.assigned_to=fields.assigned_to; renderLijst(); }
    this.sb.from("items").update(fields).eq("id",id).then(function(){},function(){});
  },
  finish:function(){
    var done=state.list.filter(function(i){return i.done;}); if(!done.length||!this.active) return;
    var ids=done.map(function(i){return i.id;});
    done.forEach(function(it){ recordPurchase(it.name, it.price); }); save();
    state.list=state.list.filter(function(i){return !i.done;}); renderLijst();
    this.sb.from("items").delete().in("id",ids).then(function(){},function(){});
    toast(done.length+(done.length===1?" gekocht":" gekocht")); vibrate(12); renderVaste();
  },

  /* ---- lijstbeheer ---- */
  createList:async function(name){
    var r=await this.sb.rpc("create_list",{p_name:name||"Boodschappen", p_display_name:this.myName(), p_color:this.me.color});
    if(r.error){ toast("Aanmaken mislukt"); return null; }
    await this.loadLists(); await this.open(r.data.id); switchTab("lijst");
    openShareSheet(r.data.id); return r.data;
  },
  joinList:async function(code){
    var r=await this.sb.rpc("join_list",{p_code:(code||"").trim(), p_display_name:this.myName(), p_color:this.me.color});
    if(r.error){ toast(r.error.message||"Join mislukt"); return null; }
    try{ history.replaceState({}, "", location.pathname); }catch(e){}
    await this.loadLists(); await this.open(r.data.id); switchTab("lijst");
    toast("Welkom bij "+r.data.name); return r.data;
  },
  leaveList:async function(listId){
    await this.sb.from("members").delete().eq("list_id",listId).eq("user_id",this.userId);
    this.lists=this.lists.filter(function(l){return l.id!==listId;});
    if(this.active===listId) this.openLocal();
    else { renderListSwitch(); }
  },
  shareLink:function(list){ return location.origin+location.pathname+"?join="+list.join_code; },
  sendLink:function(list){ return location.origin+location.pathname+"?send="+list.send_token; },
  waitReady:function(maxMs){
    var self=this;
    return new Promise(function(resolve){
      if(self.sb){ resolve(true); return; }
      var step=100, elapsed=0;
      var t=setInterval(function(){
        elapsed+=step;
        if(self.sb){ clearInterval(t); resolve(true); }
        else if(elapsed>=(maxMs||5000)){ clearInterval(t); resolve(false); }
      }, step);
    });
  }
};

function whenCloudReady(cb){
  if(Cloud.sb){ cb(); return; }
  if(!Cloud.enabled){ toast("Cloud niet geconfigureerd"); return; }
  toast("Verbinding maken…");
  Cloud.waitReady(5000).then(function(ok){
    if(ok) cb();
    else toast("Geen verbinding — check je internet");
  });
}

var Shortcuts = {
  items:[],
  load:function(){
    try{ var raw=localStorage.getItem("mandje.shortcuts"); this.items=raw?JSON.parse(raw):[]; }catch(e){ this.items=[]; }
    if(!Array.isArray(this.items)) this.items=[];
  },
  save:function(){ try{ localStorage.setItem("mandje.shortcuts", JSON.stringify(this.items)); }catch(e){} },
  byToken:function(t){ for(var i=0;i<this.items.length;i++) if(this.items[i].token===t) return this.items[i]; return null; },
  byId:function(id){ for(var i=0;i<this.items.length;i++) if(this.items[i].id===id) return this.items[i]; return null; },
  add:function(name, token, color){
    var id="sc_"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    this.items.push({id:id, name:(name||"Lijst"), token:token, color:color||pickColor(), lastUsed:nowISO()});
    this.save(); renderShortcutsRow(); return id;
  },
  remove:function(id){ this.items=this.items.filter(function(s){return s.id!==id;}); this.save(); renderShortcutsRow(); },
  rename:function(id, name){ var s=this.byId(id); if(s){ s.name=name; this.save(); renderShortcutsRow(); } },
  touch:function(id){ var s=this.byId(id); if(s){ s.lastUsed=nowISO(); this.save(); } }
};

function parseTokenFromInput(input){
  input=(input||"").trim(); if(!input) return null;
  try{ var u=new URL(input); var t=u.searchParams.get("send"); if(t) return t; }catch(e){}
  var m=input.match(/[?&]send=([^&\s#]+)/); if(m){ try{ return decodeURIComponent(m[1]); }catch(e){ return m[1]; } }
  if(/^[A-Za-z0-9_\-]{8,}$/.test(input)) return input;
  return null;
}

function renderShortcutsRow(){
  var wrap=document.getElementById("shortcuts-row"); if(!wrap) return;
  if(activeTab!=="lijst" || !Cloud.enabled){ wrap.innerHTML=""; wrap.className="shortcuts-row empty"; return; }
  wrap.className="shortcuts-row";
  var sorted=Shortcuts.items.slice().sort(function(a,b){
    return new Date(b.lastUsed||0).getTime() - new Date(a.lastUsed||0).getTime();
  });
  var inner='<div class="sc-scroll">';
  sorted.forEach(function(s){
    inner+='<button class="sc-chip" data-id="'+s.id+'">'+
      '<span class="sc-dot" style="background:'+s.color+'"></span>'+
      '<span class="sc-arrow">→</span>'+
      '<span class="sc-name">'+escapeHtml(s.name)+'</span>'+
    '</button>';
  });
  if(sorted.length===0){
    inner+='<button class="sc-chip sc-action sc-action-wide" data-actions="1"><span class="sc-act-ico">+</span><span class="sc-act-lbl">Snelkoppeling</span></button>';
  } else {
    inner+='<button class="sc-chip sc-action" data-actions="1" aria-label="Snelkoppeling-acties">+</button>';
  }
  inner+='</div>';
  wrap.innerHTML=inner;
  wrap.querySelectorAll(".sc-chip").forEach(function(b){
    if(b.dataset.actions){
      b.addEventListener("click", function(){ openShareActionSheet(); });
    } else {
      var id=b.dataset.id;
      b.addEventListener("click", function(){ openSendSheet(id); });
      var lpTimer=null;
      var startLP=function(){ lpTimer=setTimeout(function(){ vibrate(15); openManageShortcutSheet(id); }, 550); };
      var clrLP=function(){ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } };
      b.addEventListener("touchstart", startLP, {passive:true});
      b.addEventListener("touchend", clrLP);
      b.addEventListener("touchmove", clrLP);
      b.addEventListener("touchcancel", clrLP);
    }
  });
}

function openReceiveFlow(){
  whenCloudReady(function(){
    if(Cloud.active){ openShareSheet(Cloud.active); return; }
    if(Cloud.lists && Cloud.lists.length){
      var firstId=Cloud.lists[0].id;
      Cloud.open(firstId).then(function(){ openShareSheet(firstId); }, function(){ openShareSheet(firstId); });
      return;
    }
    ensureIdentity(function(){
      var nm=(Cloud.myName && Cloud.myName()) || "mij";
      Cloud.createList("Boodschappen van " + nm);
    });
  });
}

function openSendSheet(scId){
  var s=Shortcuts.byId(scId); if(!s) return;
  var sent=[];
  var html='<div class="grip"></div>'+
    '<h3 style="display:flex;align-items:center;gap:10px"><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:'+s.color+';flex:0 0 auto"></span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis">Sturen naar '+escapeHtml(s.name)+'</span></h3>'+
    '<div class="field" style="margin-bottom:6px">'+
      '<svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>'+
      '<input class="name" id="sc-input" type="search" enterkeyhint="send" placeholder="Bijv. melk, brood…" autocapitalize="sentences" autocomplete="off" autocorrect="off" spellcheck="false">'+
      '<button class="addbtn" id="sc-send" aria-label="Stuur"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></button>'+
    '</div>'+
    '<div class="chips" id="sc-sent" style="margin:14px 0 4px"></div>'+
    '<div class="hint" style="margin:8px 6px 4px">De ander ziet je toevoegingen direct in hun lijst.</div>';
  var sh=openSheet2(html);
  var inp=sh.querySelector("#sc-input");
  var btn=sh.querySelector("#sc-send");
  function send(){
    var nm=(inp.value||"").trim(); if(!nm) return;
    whenCloudReady(function(){
      var from=Cloud.myName();
      Cloud.sb.rpc("add_item_via_token",{p_token:s.token, p_name:nm, p_qty:1, p_note:"", p_from:from}).then(function(r){
        if(r.error){ toast("Versturen mislukt"); return; }
        sent.unshift(nm); inp.value="";
        sh.querySelector("#sc-sent").innerHTML=sent.map(function(n){return '<span class="chip"><span class="emoji">✓</span>'+escapeHtml(n)+'</span>';}).join("");
        inp.focus();
        Shortcuts.touch(s.id);
      },function(){ toast("Versturen mislukt"); });
    });
  }
  btn.addEventListener("click", send);
  inp.addEventListener("keydown", function(e){ if(e.key==="Enter") send(); });
  setTimeout(function(){ if(inp) inp.focus(); }, 280);
}

function openAddShortcutSheet(prefilledToken){
  var html='<div class="grip"></div>'+
    '<h3>Snelkoppeling toevoegen</h3>'+
    '<div class="hint" style="margin:0 6px 14px;line-height:1.5">Vraag de ander om in <b>hun Mandje</b> op de <b>Delen-knop</b> te tikken en daarna op <b>"Deel \'stuur items\'-link"</b>. Ze sturen \'m bv. via WhatsApp naar jou — plak die link hier.</div>'+
    '<div class="frow"><input class="txt" id="sc-tokin" placeholder="Plak stuur-link" value="'+escapeAttr(prefilledToken||"")+'" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="url"></div>'+
    '<div class="sheet-actions"><button class="save" id="sc-save-add">Opslaan</button></div>';
  var sh=openSheet2(html);
  setTimeout(function(){ var t=sh.querySelector("#sc-tokin"); if(t) t.focus(); }, 280);
  sh.querySelector("#sc-save-add").addEventListener("click", function(){
    var raw=sh.querySelector("#sc-tokin").value;
    var token=parseTokenFromInput(raw);
    if(!token){ toast("Deze link werkt niet"); return; }
    if(Shortcuts.byToken(token)){ toast("Al opgeslagen"); closeSheet2(); return; }
    whenCloudReady(function(){
      Cloud.sb.rpc("list_name_by_token",{p_token:token}).then(function(r){
        if(r.error || !r.data){ toast("Link verlopen of ongeldig"); return; }
        Shortcuts.add(r.data, token, pickColor());
        closeSheet2(); toast("“"+r.data+"” opgeslagen");
      }, function(){ toast("Geen verbinding — check je internet"); });
    });
  });
}

function openManageShortcutSheet(id){
  var s=Shortcuts.byId(id); if(!s) return;
  var html='<div class="grip"></div>'+
    '<h3 style="display:flex;align-items:center;gap:10px"><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:'+s.color+';flex:0 0 auto"></span><span>'+escapeHtml(s.name)+'</span></h3>'+
    '<div class="frow"><input class="txt" id="sc-rename" value="'+escapeAttr(s.name)+'" autocapitalize="words"></div>'+
    '<div class="sheet-actions"><button class="save" id="sc-save-name">Naam opslaan</button><button class="del" id="sc-delete">Verwijder</button></div>';
  var sh=openSheet2(html);
  sh.querySelector("#sc-save-name").addEventListener("click", function(){
    var v=(sh.querySelector("#sc-rename").value||"").trim();
    if(!v){ toast("Naam mag niet leeg zijn"); return; }
    Shortcuts.rename(id, v); closeSheet2(); toast("Hernoemd");
  });
  sh.querySelector("#sc-delete").addEventListener("click", function(){
    if(confirm("Snelkoppeling '"+s.name+"' verwijderen?")){
      Shortcuts.remove(id); closeSheet2(); toast("Verwijderd");
    }
  });
}

function renderMembersRow(){
  var row=$("#members-row"); if(!row) return;
  if(!Cloud.active || activeTab!=="lijst"){ row.className="members-row empty"; row.innerHTML=""; return; }
  row.className="members-row";
  var now=Date.now();
  var avs=Cloud.members.map(function(m){
    var online = m.last_seen && (now-new Date(m.last_seen).getTime() < 120000);
    return '<div class="av" title="'+escapeHtml(m.display_name)+'" style="background:'+m.color+';'+(online?'':'opacity:.5')+'">'+initials(m.display_name)+'</div>';

function openSwitchSheet(){
  var html='<h3>Lijsten</h3>';
  // persoonlijk
  html+='<div class="ls-item'+(!Cloud.active?" active":"")+'" data-act="local"><div class="lsi-ico">🧺</div><div style="flex:1"><div class="lsi-name">Persoonlijk</div><div class="lsi-sub">Alleen op dit toestel</div></div>'+(!Cloud.active?'<span class="lsi-check">✓</span>':'')+'</div>';

  var s=openSheet2(html);
  s.querySelectorAll(".ls-item").forEach(function(it){

  s.querySelector("#ls-join").addEventListener("click",function(){ closeSheet2(); ensureIdentity(function(){ promptJoin(); }); });
}

/* vraag eenmalig naam + kleur; daarna callback */
function ensureIdentity(cb){
  if(Cloud.me && Cloud.me.display_name){ cb(); return; }
  var color=Cloud.me ? Cloud.me.color : pickColor();
  var dots=MEMBER_COLORS.map(function(c){ return '<button class="cadchip clr" data-c="'+c+'" style="width:34px;height:34px;border-radius:50%;padding:0;background:'+c+';'+(c===color?'outline:3px solid var(--ink);outline-offset:2px':'border-color:transparent')+'"></button>'; }).join("");
  var html='<h3>Hoe heet je?</h3><div class="frow"><input class="txt" id="id-name" placeholder="Je naam" autocapitalize="words"></div>'+
    '<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin:6px 6px 10px">Kleur</div>'+
    '<div class="cadrow" id="id-colors" style="gap:10px">'+dots+'</div>'+
    '<div class="sheet-actions"><button class="save" id="id-go">Doorgaan</button></div>';
  var s=openSheet2(html);
  setTimeout(function(){ var i=s.querySelector("#id-name"); if(i) i.focus(); },250);
  var chosen=color;
  s.querySelectorAll("#id-colors .clr").forEach(function(b){
    b.addEventListener("click",function(){ chosen=b.dataset.c; s.querySelectorAll("#id-colors .clr").forEach(function(x){x.style.outline="";}); b.style.outline="3px solid var(--ink)"; b.style.outlineOffset="2px"; });
  });
  s.querySelector("#id-go").addEventListener("click",function(){
    var nm=(s.querySelector("#id-name").value||"").trim(); if(!nm){ toast("Vul je naam in"); return; }
    Cloud.me={display_name:nm, color:chosen}; Cloud.saveMe(); closeSheet2(); cb();
  });
}

  var l=Cloud.listById(listId); if(!l) return;
  var memberHtml=Cloud.members.map(function(m){ return '<div class="ls-item"><div class="av" style="width:34px;height:34px;background:'+m.color+';color:#fff;border:0">'+initials(m.display_name)+'</div><div class="lsi-name" style="font-size:16px">'+escapeHtml(m.display_name)+(m.user_id===Cloud.userId?' <span style="color:var(--ink-faint);font-weight:500">(jij)</span>':'')+'</div></div>'; }).join("");
  var html='<h3>'+escapeHtml(l.name)+' delen</h3>'+
    '<div class="code-box"><div class="cb-lbl">Join-code</div><div class="cb-code">'+l.join_code+'</div></div>'+
    '<button class="mbtn" id="sh-invite" style="background:var(--green);color:var(--on-green);border-color:transparent">Deel uitnodiging</button>'+
    '<button class="mbtn" id="sh-link">Kopieer uitnodig-link</button>'+
    '<button class="mbtn" id="sh-send">Deel "stuur items"-link</button>'+
    '<div class="hint" style="margin:2px 6px 14px;line-height:1.5">De <b>uitnodig-link</b> laat iemand meedoen en alles zien. De <b>stuur-link</b> geeft iemand alleen een drop-pagina om dingen aan jou te sturen — zonder app, zonder mee te kijken.</div>'+
    (memberHtml?('<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin:6px 6px 8px">Leden ('+Cloud.members.length+')</div>'+memberHtml):'')+
    '<div class="sheet-actions"><button class="del" id="sh-leave" style="width:100%">Lijst verlaten</button></div>';
  var s=openSheet2(html);
  s.querySelector("#sh-invite").addEventListener("click",function(){ shareNative(Cloud.shareLink(l), "Doe mee met onze boodschappenlijst \""+l.name+"\" in Mandje 🧺", "Uitnodig-link gekopieerd"); });
  s.querySelector("#sh-link").addEventListener("click",function(){ copyText(Cloud.shareLink(l),"Uitnodig-link gekopieerd"); });
  s.querySelector("#sh-send").addEventListener("click",function(){ shareNative(Cloud.sendLink(l), "Stuur boodschappen naar onze lijst \""+l.name+"\" 🧺", "Stuur-link gekopieerd"); });
  s.querySelector("#sh-leave").addEventListener("click",function(){ if(confirm("Deze gedeelde lijst verlaten?")){ closeSheet2(); Cloud.leaveList(l.id); } });
}

function copyText(txt,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){toast(msg);},function(){ prompt("Kopieer:",txt); }); }
  else prompt("Kopieer:",txt);
}
function shareNative(url, text, fallbackMsg){
  if(navigator.share){
    navigator.share({title:"Mandje", text:text, url:url}).then(function(){},function(){});
  } else {
    copyText(url, fallbackMsg);
  }
}

      },function(){ toast("Versturen mislukt"); });
    }
    scr.querySelector("#ss-add").addEventListener("click",send);
    nameI.addEventListener("keydown",function(e){ if(e.key==="Enter") send(); });
    var remBtn=scr.querySelector("#ss-remember");
    if(remBtn && !alreadySaved){
      remBtn.addEventListener("click", function(){
        var defaultName=listName||"Lijst";
        var nm=prompt("Naam voor deze snelkoppeling:", defaultName);
        if(nm===null) return;
        nm=(nm||"").trim(); if(!nm) nm=defaultName;
        Shortcuts.add(nm, token, pickColor());
        remBtn.textContent="✓ Snelkoppeling opgeslagen";
        remBtn.style.background=""; remBtn.style.color=""; remBtn.style.borderColor="";
        remBtn.style.opacity=".55"; remBtn.style.pointerEvents="none";
        toast("Snelkoppeling opgeslagen");
      });
    }
  }
  // lijstnaam ophalen
  if(Cloud.sb){
    Cloud.sb.rpc("list_name_by_token",{p_token:token}).then(function(r){ render(r&&r.data?r.data:null); },function(){ render(null); });
  } else render(null);
}


if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init);
else init();

})();

</script>
</body>
</html>
