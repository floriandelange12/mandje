<!DOCTYPE html>
<html lang="nl" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Mandje</title>

<!-- PWA / iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mandje">
<meta name="theme-color" content="#F6F4EF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14140F" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="data:image/png;base64,__ICON180__">
<link rel="manifest" href='data:application/manifest+json,{"name":"Mandje","short_name":"Mandje","start_url":".","scope":".","display":"standalone","background_color":"%23F6F4EF","theme_color":"%232F7A4F","icons":[{"src":"data:image/png;base64,__ICON512__","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

<style>
  @font-face{
    font-family:"Fraunces";
    src:url(data:font/woff2;base64,__FONT__) format("woff2");
    font-weight:500 700; font-style:normal; font-display:swap;
  }
  :root{
    --bg:#F6F4EF; --surface:#FFFFFF; --surface-2:#FBFAF7; --surface-3:#F1EEE7;
    --ink:#1C1B18; --ink-soft:#6A6459; --ink-faint:#A8A294;
    --line:#E9E4DA; --line-strong:#DCD6CA;
    --green:#2F7A4F; --green-2:#E7F1EA; --on-green:#FFFFFF;
    --amber:#9C6710; --amber-2:#FBF0DC;
    --red:#C0392B;
    --shadow-sm:0 1px 2px rgba(28,27,24,.05);
    --shadow:0 1px 2px rgba(28,27,24,.04), 0 10px 26px -8px rgba(28,27,24,.10);
    --shadow-lg:0 12px 40px -8px rgba(28,27,24,.22);
    --blur:saturate(180%) blur(20px);
    --r-card:18px; --r-pill:999px;
    --tabbar-h:60px;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --font:-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --display:"Fraunces", ui-serif, Georgia, "Times New Roman", serif;
    --ease:cubic-bezier(.24,.65,0,1);
  }
  html[data-theme="dark"]{
    --bg:#141410; --surface:#1E1D17; --surface-2:#232219; --surface-3:#2A2920;
    --ink:#F2EFE6; --ink-soft:#A39C8C; --ink-faint:#6F6A5C;
    --line:#2C2B22; --line-strong:#3A3830;
    --green:#7BD9A6; --green-2:#1F3329; --on-green:#0E1A12;
    --amber:#EBB055; --amber-2:#2E2613;
    --red:#E5705F;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 1px 2px rgba(0,0,0,.25), 0 12px 28px -10px rgba(0,0,0,.5);
    --shadow-lg:0 16px 44px -10px rgba(0,0,0,.6);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:var(--font); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overscroll-behavior-y:none; -webkit-user-select:none; user-select:none;
    font-size:17px; line-height:1.4;
  }
  input,button,select,textarea{font-family:var(--font); color:inherit;}
  button{cursor:pointer;}
  ::placeholder{color:var(--ink-faint);}

  .app{max-width:600px; margin:0 auto; height:100%; position:relative; overflow:hidden; z-index:1;}
  body::before{ content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(130% 70% at 50% -15%, color-mix(in srgb, var(--green) 9%, transparent), transparent 58%),
      radial-gradient(90% 50% at 85% 8%, color-mix(in srgb, var(--amber) 6%, transparent), transparent 60%);
  }
  html[data-theme="dark"] body::before{
    background:
      radial-gradient(130% 70% at 50% -15%, color-mix(in srgb, var(--green) 14%, transparent), transparent 55%),
      radial-gradient(90% 50% at 85% 8%, color-mix(in srgb, var(--amber) 8%, transparent), transparent 60%);
  }

  /* ---------- Top bar (compact title) ---------- */
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:30;
    padding-top:var(--safe-t); height:calc(var(--safe-t) + 50px);
    display:flex; align-items:center; justify-content:center;
    background:transparent; transition:background .18s ease, border-color .18s ease;
    border-bottom:.5px solid transparent;
  }
  .topbar.scrolled{ background:color-mix(in srgb, var(--bg) 80%, transparent); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border-bottom-color:var(--line); transition:background .12s ease, border-color .12s ease; }
  .topbar .ctitle{ font-size:17px; font-weight:700; letter-spacing:-.01em; opacity:0; transform:translateY(2px); transition:opacity .2s ease, transform .2s ease; }
  .topbar.scrolled .ctitle{ opacity:1; transform:none; }

  /* ---------- Scroll area ---------- */
  main{ position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-left:max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right)); }
  main::-webkit-scrollbar{ display:none; }
  /* Floating add-bar = ~62px hoog; extra ruimte onderaan zodat items niet verdwijnen */
  .pad-bottom{ height:calc(var(--tabbar-h) + var(--safe-b) + 90px); }
  .pad-bottom.with-total{ height:calc(var(--tabbar-h) + var(--safe-b) + 200px); }
  /* Op Vaste/Meer-tabs is add-bar verborgen — terug naar normale padding */
  body.no-addbar .pad-bottom{ height:calc(var(--tabbar-h) + var(--safe-b) + 24px); }
  body.no-addbar .pad-bottom.with-total{ height:calc(var(--tabbar-h) + var(--safe-b) + 132px); }

  .largehead{ padding:calc(var(--safe-t) + 54px) 4px 6px; }
  h1{ font-family:var(--display); font-size:31px; line-height:1.06; font-weight:600; letter-spacing:-.01em; margin:2px 0 3px; transition:opacity .22s var(--ease); }
  .largehead[data-loading] h1{ opacity:0; }
  h1.has-dot{ display:flex; align-items:center; gap:12px; }
  h1.has-dot::before{ content:""; width:14px; height:14px; border-radius:50%; background:var(--list-dot,transparent); flex:0 0 auto; box-shadow:0 0 0 1px color-mix(in srgb, var(--list-dot,transparent) 35%, transparent); }
  .subhead{ font-size:14px; color:var(--ink-soft); }
  .topbar .ctitle.has-dot{ display:inline-flex; align-items:center; gap:8px; }
  .topbar .ctitle.has-dot::before{ content:""; width:9px; height:9px; border-radius:50%; background:var(--list-dot,transparent); flex:0 0 auto; }
  .topbar .gear{ position:absolute; right:max(8px, env(safe-area-inset-right)); top:calc(var(--safe-t) + 7px); width:36px; height:36px; border:0; background:transparent; color:var(--ink-soft); display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background .15s ease, color .15s ease; }
  .topbar .gear svg{ width:23px; height:23px; }
  .topbar .gear:active{ background:var(--surface-3); }
  .topbar .share-top{ position:absolute; right:calc(max(8px, env(safe-area-inset-right)) + 42px); top:calc(var(--safe-t) + 7px); width:36px; height:36px; border:0; background:transparent; color:var(--ink-soft); display:none; align-items:center; justify-content:center; border-radius:50%; transition:background .15s ease, color .15s ease; }
  .topbar .share-top.show{ display:flex; }
  .topbar .share-top svg{ width:21px; height:21px; }
  .topbar .share-top:active{ background:var(--surface-3); }
  .topbar .offline-badge{ position:absolute; left:max(12px, env(safe-area-inset-left)); top:calc(var(--safe-t) + 14px); display:none; align-items:center; gap:5px; padding:3px 10px; background:color-mix(in srgb, var(--amber) 18%, var(--surface)); border:1px solid color-mix(in srgb, var(--amber) 35%, transparent); color:var(--amber); border-radius:99px; font-size:11px; font-weight:700; letter-spacing:.02em; pointer-events:none; }
  .topbar .offline-badge.show{ display:inline-flex; }
  .topbar .offline-badge::before{ content:""; width:6px; height:6px; border-radius:50%; background:var(--amber); }

  html,body{ overflow:hidden; }

  /* ---------- Add bar (floating, one-handed) ---------- */
  /* --kb-lift wordt door JS op de toetsenbord-hoogte gezet (visualViewport).
     Alleen de balk beweegt mee — de rest van de app blijft staan = geen scherm-sprong. */
  .addwrap{
    position:fixed;
    left:max(12px, env(safe-area-inset-left));
    right:max(12px, env(safe-area-inset-right));
    bottom:calc(var(--tabbar-h) + max(16px, var(--safe-b)) + 14px);
    z-index:29;
    padding:0;
    background:transparent;
    transition:bottom .22s var(--ease), transform .22s var(--ease), opacity .2s ease;
  }
  /* Toetsenbord open: balk zakt naar net boven de toetsenbord-rand; tabbar + totals weg */
  body.kb-open .addwrap{ bottom:calc(var(--kb-lift, 0px) + 10px); }
  body.kb-open .totals{ opacity:0; pointer-events:none; }
  body.kb-open .tabbar{ opacity:0; pointer-events:none; }
  /* Verbergen wanneer item-sheet open is zodat 'ie geen overlap geeft */
  body.sheet-open .addwrap{ transform:translateY(140%); opacity:0; pointer-events:none; }
  .field{ display:flex; align-items:center; width:100%; min-width:0; background:var(--surface); border:1px solid var(--line); border-radius:17px; padding:5px 5px 5px 15px; box-shadow:var(--shadow-sm); transition:border-color .18s ease, box-shadow .18s ease; }
  .field:focus-within{ border-color:color-mix(in srgb, var(--green) 55%, var(--line)); box-shadow:0 0 0 4px var(--green-2); }
  .field svg.lead{ width:20px; height:20px; color:var(--ink-faint); flex:0 0 20px; margin-right:10px; }
  .field input.name{ flex:1 1 0; min-width:0; border:0; outline:0; background:transparent; font-size:17px; padding:12px 0; -webkit-user-select:text; user-select:text; }
  .field input.name::-webkit-search-cancel-button, .field input.name::-webkit-search-decoration{ -webkit-appearance:none; appearance:none; display:none; }
  .pw{ display:inline-flex; align-items:center; gap:3px; flex:0 0 auto; margin:0 9px; padding:7px 11px; background:var(--surface-3); border-radius:12px; }
  .pw .cur{ color:var(--ink-soft); font-weight:700; font-size:14px; }
  .pw input.pricein{ border:0; outline:0; background:transparent; font-size:15px; font-weight:700; color:var(--amber); width:46px; text-align:right; padding:4px 0; -webkit-user-select:text; user-select:text; }
  .pw input.pricein::placeholder{ color:var(--ink-faint); font-weight:600; }
  .addbtn{ flex:0 0 42px; width:42px; height:42px; border:0; border-radius:13px; background:var(--green); color:var(--on-green); display:flex; align-items:center; justify-content:center; margin-left:0; box-shadow:var(--shadow-sm); transition:transform .12s var(--ease), filter .12s ease; }
  .addbtn svg{ width:22px; height:22px; }
  .addbtn:active{ transform:scale(.9); filter:brightness(.92); }
  .addbtn-bulk{ flex:0 0 36px; width:36px; height:36px; margin-left:6px; border:0; border-radius:11px; background:var(--surface-3); color:var(--ink-soft); display:flex; align-items:center; justify-content:center; transition:transform .12s var(--ease), background .15s ease; }
  .addbtn-bulk svg{ width:18px; height:18px; }
  .addbtn-bulk:active{ transform:scale(.92); background:var(--line-strong); }

  /* Autocomplete (opent naar boven omdat add-bar onderaan zit) */
  .ac{ position:relative; }
  .ac-list{ position:absolute; left:0; right:0; bottom:calc(100% + 6px); background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-lg); overflow:hidden; z-index:40; display:none; max-height:50vh; overflow-y:auto; transform-origin:bottom center; }
  .ac-list.show{ display:block; animation:acFadeUp .18s var(--ease) backwards; }
  @keyframes acFadeUp{ from{ opacity:0; transform:translateY(8px) scale(.98);} to{ opacity:1; transform:none;} }
  .ac-item{ display:flex; align-items:center; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .ac-item:last-child{ border-bottom:0; }
  .ac-item:active{ background:var(--surface-3); }
  .ac-emoji{ font-size:19px; width:24px; text-align:center; }
  .ac-name{ flex:1; font-size:16px; font-weight:500; }
  .ac-tag{ font-size:12px; color:var(--ink-faint); font-weight:600; }
  .ac-add{ color:var(--green); font-weight:700; font-size:20px; }

  /* ---------- Sections & rows ---------- */
  .section{ display:flex; align-items:center; gap:8px; margin:20px 6px 8px; font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); }
  .section .cat-emoji{ font-size:15px; }
  .section .count{ color:var(--ink-faint); font-weight:600; }
  .section .spacer{ flex:1; }
  .section .link{ text-transform:none; letter-spacing:0; font-size:14px; font-weight:600; color:var(--green); }

  ul.list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .row{ position:relative; border-radius:var(--r-card); overflow:hidden; }
  .row .behind{ position:absolute; inset:0; background:var(--red); display:flex; align-items:center; justify-content:flex-end; gap:8px; padding-right:22px; color:#fff; font-weight:700; font-size:15px; }
  .row .behind svg{ width:20px; height:20px; }
  .card{ position:relative; display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:12px 14px; box-shadow:var(--shadow-sm); transition:transform .26s var(--ease); touch-action:pan-y; }

  .check{ position:relative; flex:0 0 auto; width:36px; height:36px; border-radius:50%; border:2px solid var(--line-strong); display:flex; align-items:center; justify-content:center; background:transparent; transition:background .18s var(--ease), border-color .18s var(--ease); }
  .check::before{ content:""; position:absolute; inset:-6px; }
  .check svg{ width:19px; height:19px; opacity:0; transform:scale(.3); transition:opacity .18s var(--ease), transform .22s var(--ease); }
  .row.done .check{ background:var(--green); border-color:var(--green); }
  .row.done .check svg{ opacity:1; transform:scale(1); }

  .meta{ flex:1; min-width:0; }
  .nm{ font-size:17px; font-weight:600; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .18s ease; }
  .row.done .nm{ color:var(--ink-faint); text-decoration:line-through; }
  .sub2{ font-size:13px; color:var(--ink-soft); margin-top:1px; display:flex; align-items:center; gap:6px; }
  .sub2 .pill-due{ color:var(--amber); font-weight:700; }

  .qty{ flex:0 0 auto; display:flex; align-items:center; background:var(--surface-3); border-radius:11px; overflow:visible; }
  .qty button{ position:relative; width:30px; height:30px; border:0; background:transparent; font-size:18px; color:var(--green); border-radius:8px; }
  .qty button::before{ content:""; position:absolute; inset:-7px; }
  .qty button:active{ background:var(--green-2); }
  .qty span{ min-width:20px; text-align:center; font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }
  .price{ flex:0 0 auto; min-width:58px; text-align:right; font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; }
  .row.done .price{ color:var(--ink-faint); }

  /* Chips (bijna op / quick add) */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); padding:8px 13px; font-size:15px; font-weight:600; box-shadow:var(--shadow-sm); transition:transform .12s var(--ease); }
  .chip:active{ transform:scale(.95); }
  .chip .emoji{ font-size:16px; }
  .chip .plus{ color:var(--green); font-weight:800; font-size:17px; margin-left:1px; }
  .chip.amber{ background:var(--amber-2); border-color:transparent; }
  .chip.amber .plus{ color:var(--amber); }
  .banner{ background:linear-gradient(135deg, var(--amber-2), color-mix(in srgb, var(--amber-2) 60%, var(--surface))); border:1px solid color-mix(in srgb, var(--amber) 22%, transparent); border-radius:var(--r-card); padding:14px; }
  .banner .b-top{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; color:var(--amber); margin-bottom:10px; }
  .banner .b-top svg{ width:17px; height:17px; }

  /* Vaste-tab card */
  .vrow{ display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:13px 14px; box-shadow:var(--shadow-sm); }
  .vrow .vemoji{ flex:0 0 auto; width:40px; height:40px; border-radius:12px; background:var(--green-2); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .vrow .vmeta{ flex:1; min-width:0; }
  .vrow .vname{ font-size:17px; font-weight:600; }
  .vrow .vcad{ font-size:13px; color:var(--ink-soft); margin-top:1px; }
  .vrow .vcad b{ color:var(--amber); }
  .vrow .vadd{ flex:0 0 auto; width:38px; height:38px; border-radius:50%; border:0; background:var(--green); color:var(--on-green); font-size:22px; box-shadow:var(--shadow-sm); transition:transform .12s var(--ease); }
  .vrow .vadd:active{ transform:scale(.9); }
  .vrow.onlist .vadd{ background:var(--surface-3); color:var(--green); }

  /* Empty state */
  .empty{ text-align:center; padding:54px 26px; color:var(--ink-soft); }
  .empty .ico{ width:72px; height:72px; margin:0 auto 16px; border-radius:22px; background:var(--green-2); display:flex; align-items:center; justify-content:center; }
  .empty .ico svg{ width:34px; height:34px; color:var(--green); }
  .empty h2{ font-family:var(--display); font-size:25px; font-weight:600; color:var(--ink); margin:0 0 7px; letter-spacing:-.01em; }
  .empty p{ font-size:15px; margin:0; line-height:1.5; }

  /* ---------- Totals bar (boven floating add-bar) ---------- */
  .totals{ position:absolute; left:0; right:0; bottom:calc(var(--tabbar-h) + max(16px, var(--safe-b)) + 78px); z-index:25; padding:0 max(12px, env(safe-area-inset-right)) 8px max(12px, env(safe-area-inset-left)); pointer-events:none; transition:opacity .2s ease, transform .2s ease; }
  .totals.hide{ opacity:0; transform:translateY(8px); pointer-events:none; }
  .totals-inner{ background:color-mix(in srgb, var(--surface) 86%, transparent); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow-lg); padding:12px 16px; pointer-events:auto; }
  .trow{ display:flex; align-items:baseline; justify-content:space-between; }
  .trow .lbl{ font-size:13px; font-weight:600; color:var(--ink-soft); }
  .trow .amt{ font-size:28px; font-weight:800; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .t-hint{ font-size:12px; color:var(--ink-faint); margin:4px 0 8px; font-style:italic; }
  .pbar{ height:6px; border-radius:99px; background:var(--surface-3); overflow:hidden; margin:9px 0 6px; }
  .pbar > i{ display:block; height:100%; background:var(--green); border-radius:99px; transition:width .35s var(--ease); }
  .trow .cart{ font-size:13px; font-weight:700; color:var(--green); }
  .finish{ border:0; background:var(--green); color:var(--on-green); font-weight:700; font-size:14px; padding:8px 14px; border-radius:12px; transition:transform .12s var(--ease); }
  .finish:active{ transform:scale(.96); }
  .forgot-row{ display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 4px; align-items:center; }
  .forgot-row .forgot-lbl{ font-size:12px; font-weight:600; color:var(--ink-soft); margin-right:2px; }
  .forgot-row .forgot-pill{ display:inline-flex; align-items:center; gap:5px; padding:5px 10px; background:var(--amber-2); color:var(--amber); border:0; border-radius:99px; font-size:13px; font-weight:700; transition:transform .12s var(--ease); }
  .forgot-row .forgot-pill:active{ transform:scale(.95); filter:brightness(.96); }
  .forgot-row .forgot-pill .plus{ font-weight:800; font-size:14px; line-height:1; }
  .finish-inline{ display:flex; justify-content:center; margin:14px 0 4px; }
  .finish-inline-btn{ border:0; background:var(--green); color:var(--on-green); font-weight:700; font-size:16px; padding:13px 28px; border-radius:14px; box-shadow:var(--shadow-sm); transition:transform .12s var(--ease), filter .12s ease; }
  .finish-inline-btn:active{ transform:scale(.96); filter:brightness(.94); }

  /* ---------- Tab bar (floating pill) ---------- */
  .tabbar{ position:absolute; left:max(12px, env(safe-area-inset-left)); right:max(12px, env(safe-area-inset-right)); bottom:max(8px, var(--safe-b)); z-index:28; height:var(--tabbar-h); display:flex; background:color-mix(in srgb, var(--surface) 80%, transparent); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow-lg); padding:0; overflow:hidden; }
  .tab{ flex:1; background:transparent; border:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--ink-faint); font-size:11px; font-weight:600; }
  .tab svg{ width:23px; height:23px; transition:transform .15s var(--ease); }
  .tab.active{ color:var(--green); }
  .tab:active svg{ transform:scale(.88); }

  /* ---------- Views ---------- */
  .view{ display:none; }
  .view.active{ display:block; animation:viewSlideIn .22s var(--ease); }
  @keyframes viewSlideIn{ from{ opacity:0; transform:translateY(-6px);} to{ opacity:1; transform:none;} }

  /* ---------- Settings (Meer) ---------- */
  .group{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); overflow:hidden; box-shadow:var(--shadow-sm); margin-bottom:18px; }
  .grow{ display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); }
  .grow:last-child{ border-bottom:0; }
  .grow .glabel{ flex:1; font-size:16px; font-weight:500; }
  .grow .gsub{ font-size:13px; color:var(--ink-soft); margin-top:2px; }
  .seg{ display:flex; background:var(--surface-3); border-radius:10px; padding:2px; }
  .seg button{ border:0; background:transparent; padding:6px 12px; border-radius:8px; font-size:14px; font-weight:600; color:var(--ink-soft); }
  .seg button.on{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow-sm); }
  .switch{ width:50px; height:30px; border-radius:99px; background:var(--surface-3); border:0; position:relative; transition:background .2s ease; flex:0 0 auto; }
  .switch.on{ background:var(--green); }
  .switch::after{ content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.3); transition:transform .2s var(--ease); }
  .switch.on::after{ transform:translateX(20px); }
  .mbtn{ width:100%; border:0; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; font-size:16px; font-weight:600; box-shadow:var(--shadow-sm); margin-bottom:10px; }
  .mbtn.danger{ color:var(--red); }
  .mbtn:active{ background:var(--surface-3); }
  textarea.io{ width:100%; height:120px; border:1px solid var(--line); border-radius:14px; background:var(--surface-2); padding:12px; font-size:13px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; resize:none; -webkit-user-select:text; user-select:text; }
  .hint{ font-size:13px; color:var(--ink-soft); line-height:1.5; margin:2px 6px 16px; }

  /* ---------- Bottom sheet ---------- */
  .scrim{ position:absolute; inset:0; background:rgba(0,0,0,.4); opacity:0; z-index:50; transition:opacity .3s var(--ease); pointer-events:none; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:51; background:var(--surface); border-radius:24px 24px 0 0; box-shadow:0 -10px 40px rgba(0,0,0,.25); transform:translateY(110%); transition:transform .28s var(--ease); padding:8px 18px calc(18px + var(--safe-b)); max-width:600px; margin:0 auto; }
  .sheet.show{ transform:none; }
  .grip{ width:36px; height:4px; border-radius:99px; background:color-mix(in srgb, var(--ink-faint) 55%, transparent); margin:6px auto 14px; transition:background .15s ease; }
  .sheet h3{ font-family:var(--display); font-size:25px; font-weight:600; letter-spacing:-.01em; margin:0 0 16px; }
  .sheet-label{ font-size:12px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); margin:14px 4px 8px; display:flex; align-items:center; gap:7px; }
  .sheet h3 + .sheet-label{ margin-top:6px; }
  .sheet-label .lbl-cap{ flex:1; }
  .sheet-label .lbl-hint{ font-size:11px; font-weight:600; text-transform:none; letter-spacing:0; color:var(--ink-faint); }
  .frow{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .frow .fl{ flex:1; font-size:16px; font-weight:500; }
  .sheet input.txt{ flex:1; border:1px solid var(--line); border-radius:12px; background:var(--surface-2); padding:11px 13px; font-size:16px; -webkit-user-select:text; user-select:text; }
  .sheet input.num{ width:96px; text-align:right; border:1px solid var(--line); border-radius:12px; background:var(--surface-2); padding:11px 13px; font-size:16px; font-weight:700; -webkit-user-select:text; user-select:text; }
  .catscroll{ display:flex; gap:8px; overflow-x:auto; padding:2px 0 6px; margin:0 -18px 8px; padding-left:18px; padding-right:18px; }
  .catscroll::-webkit-scrollbar{ display:none; }
  .catchip{ flex:0 0 auto; display:flex; align-items:center; gap:6px; border:1px solid var(--line); background:var(--surface-2); border-radius:var(--r-pill); padding:8px 13px; font-size:14px; font-weight:600; white-space:nowrap; }
  .catchip.on{ background:var(--green); color:var(--on-green); border-color:transparent; }
  .cadrow{ display:flex; gap:8px; flex-wrap:wrap; }
  .cadchip{ border:1px solid var(--line); background:var(--surface-2); border-radius:12px; padding:9px 13px; font-size:14px; font-weight:600; }
  .cadchip.on{ background:var(--amber); color:#fff; border-color:transparent; }
  .sheet-actions{ display:flex; gap:10px; margin-top:18px; }
  .sheet-actions .save{ flex:1; border:0; background:var(--green); color:var(--on-green); border-radius:14px; padding:15px; font-size:17px; font-weight:700; }
  .sheet-actions .del{ flex:0 0 auto; border:1px solid var(--line); background:var(--surface); color:var(--red); border-radius:14px; padding:15px 18px; font-size:17px; font-weight:700; }
  .intro-pt{ display:flex; gap:13px; align-items:flex-start; margin-bottom:15px; font-size:15px; line-height:1.45; color:var(--ink-soft); }
  .intro-pt .ip-em{ font-size:23px; flex:0 0 auto; line-height:1.2; }
  .intro-pt b{ color:var(--ink); font-weight:700; }

  /* ---------- Toast ---------- */
  .toast{ position:absolute; left:50%; bottom:calc(var(--tabbar-h) + var(--safe-b) + 20px); transform:translateX(-50%) translateY(16px); background:var(--ink); color:var(--bg); padding:11px 18px; border-radius:14px; font-size:14px; font-weight:600; opacity:0; z-index:60; pointer-events:none; box-shadow:var(--shadow-lg); transition:opacity .25s var(--ease), transform .25s var(--ease); max-width:calc(100vw - 32px); white-space:normal; text-align:center; line-height:1.35; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  .toast.has-action{ pointer-events:auto; }

  /* ---------- Cloud: list switch, members, share, send ---------- */
  .list-switch{ display:inline-flex; align-items:center; gap:7px; margin-top:8px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); padding:6px 12px 6px 13px; box-shadow:var(--shadow-sm); font-size:14px; font-weight:600; max-width:100%; }
  .list-switch .ls-ico{ font-size:15px; }
  .list-switch .ls-ico-dot{ width:11px; height:11px; border-radius:50%; flex:0 0 auto; }
  .list-switch .ls-name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .list-switch .ls-pill-sub{ font-size:11px; font-weight:600; color:var(--ink-faint); flex:0 0 auto; padding:1px 7px; background:var(--surface-3); border-radius:99px; }
  .list-switch .ls-chev{ width:16px; height:16px; color:var(--ink-faint); flex:0 0 auto; }
  .members-row{ display:flex; align-items:center; gap:8px; margin:6px 4px 6px; min-height:0; }
  .members-row.empty{ display:none; }
  .avatars{ display:flex; gap:4px; cursor:pointer; }
  .avatars .av{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; letter-spacing:.02em; }
  .members-row .share-btn{ margin-left:auto; display:inline-flex; align-items:center; gap:6px; background:var(--surface); color:var(--ink-soft); border:1px solid var(--line); border-radius:var(--r-pill); padding:5px 11px; font-size:12px; font-weight:600; }
  .members-row .share-btn svg{ width:13px; height:13px; }
  .members-row .share-btn:active{ background:var(--surface-2); }

  .ls-item{ display:flex; align-items:center; gap:12px; padding:13px 4px; border-bottom:1px solid var(--line); }
  .ls-item:last-child{ border-bottom:0; }
  .ls-item .lsi-ico{ width:40px; height:40px; border-radius:12px; background:var(--green-2); display:flex; align-items:center; justify-content:center; font-size:19px; flex:0 0 auto; }
  .ls-item .lsi-name{ flex:1; font-size:17px; font-weight:600; }
  .ls-item .lsi-sub{ font-size:13px; color:var(--ink-soft); }
  .ls-item.active .lsi-name{ color:var(--green); }
  .ls-item .lsi-check{ color:var(--green); }
  .quick-create{ margin:14px 0 0; padding:0; }
  .quick-create input{ width:100%; border:1.5px dashed var(--line-strong); border-radius:14px; background:var(--surface-2); padding:14px 16px; font-size:16px; font-weight:500; color:var(--ink); -webkit-user-select:text; user-select:text; }
  .quick-create input:focus{ outline:0; border-color:var(--green); border-style:solid; background:var(--surface); }
  .quick-create input::placeholder{ color:var(--ink-faint); font-weight:500; }

  .code-box{ text-align:center; background:var(--surface-2); border:1px dashed var(--line-strong); border-radius:16px; padding:18px; margin:4px 0 14px; }
  .code-box .cb-lbl{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); }
  .code-box .cb-code{ font-family:var(--display); font-size:40px; font-weight:600; letter-spacing:.18em; margin-top:4px; }

  /* ---------- "Stuur naar"-snelkoppelingen ---------- */
  .shortcuts-row{ margin:-2px -16px 10px; padding:0; }
  .shortcuts-row.empty{ display:none; }
  .shortcuts-row .sc-scroll{ display:flex; gap:8px; overflow-x:auto; padding:4px 16px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; }
  .shortcuts-row .sc-scroll::-webkit-scrollbar{ display:none; }
  .sc-chip{ flex:0 0 auto; display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); padding:7px 13px 7px 9px; font-size:14px; font-weight:600; color:var(--ink); box-shadow:var(--shadow-sm); scroll-snap-align:start; transition:transform .12s var(--ease); }
  .sc-chip:active{ transform:scale(.94); }
  .sc-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  .sc-arrow{ color:var(--ink-faint); font-weight:700; font-size:13px; margin-right:-2px; }
  .sc-name{ white-space:nowrap; max-width:130px; overflow:hidden; text-overflow:ellipsis; }
  .sc-action{ padding:7px 13px; color:var(--green); border-style:dashed; border-color:var(--line-strong); justify-content:center; font-size:15px; font-weight:700; gap:0; }
  .sc-action:active{ background:var(--green-2); }
  .sc-action svg{ width:16px; height:16px; }
  .sc-action-wide{ padding:7px 14px 7px 12px; gap:7px; font-size:14px; font-weight:600; color:var(--green); background:var(--green-2); border-color:transparent; border-style:solid; }
  .sc-action-wide .sc-act-ico{ font-size:16px; font-weight:800; line-height:1; }
  .sc-action-wide svg{ width:15px; height:15px; }
  .sc-action-wide .sc-act-lbl{ white-space:nowrap; }
  .sc-action-wide:active{ filter:brightness(.96); }

  /* ---------- Share-actions sheet (sa-) ---------- */
  .sa-row{ display:flex; align-items:center; gap:14px; width:100%; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow-sm); margin-bottom:10px; text-align:left; }
  .sa-row:active{ background:var(--surface-3); }
  .sa-row:last-child{ margin-bottom:0; }
  .sa-ico{ flex:0 0 auto; width:38px; height:38px; border-radius:50%; background:var(--green-2); color:var(--green); display:flex; align-items:center; justify-content:center; }
  .sa-meta{ flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
  .sa-ttl{ font-size:16px; font-weight:700; color:var(--ink); }
  .sa-sub{ font-size:13px; font-weight:500; color:var(--ink-soft); line-height:1.35; }
  .sa-chev{ flex:0 0 auto; color:var(--ink-faint); font-size:22px; font-weight:300; margin-left:4px; }

  .send-screen{ position:absolute; inset:0; z-index:80; background:var(--bg); display:none; flex-direction:column; padding:calc(var(--safe-t) + 24px) max(20px,env(safe-area-inset-left)) calc(var(--safe-b) + 24px) max(20px,env(safe-area-inset-right)); overflow-y:auto; }
  .send-screen.show{ display:flex; }
  .send-screen .ss-badge{ width:64px; height:64px; border-radius:18px; background:var(--green-2); display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
  .send-screen .ss-badge svg{ width:30px; height:30px; color:var(--green); }
  .send-screen h1{ margin:0 0 4px; }
  .send-screen .ss-sub{ color:var(--ink-soft); margin-bottom:22px; }
  .send-screen .ss-added{ margin-top:18px; }
  .send-screen .ss-added .chip{ margin:0 8px 8px 0; }

  /* ---------- Uniforme emoji-rendering ---------- */
  .emoji{ font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; font-style:normal; font-weight:400; line-height:1; vertical-align:-1px; }

  /* ---------- Search-bar (Lijst-tab) ---------- */
  .search-bar{ position:relative; margin:6px 0 12px; display:flex; align-items:center; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:9px 13px; box-shadow:var(--shadow-sm); }
  .search-bar svg.lead{ width:16px; height:16px; color:var(--ink-faint); flex:0 0 16px; margin-right:9px; }
  .search-bar input{ flex:1; border:0; outline:0; background:transparent; font-size:15px; padding:2px 0; -webkit-user-select:text; user-select:text; }
  .search-bar .search-clear{ flex:0 0 auto; width:22px; height:22px; border:0; padding:0; background:var(--surface-3); color:var(--ink-soft); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-left:6px; font-size:13px; line-height:1; }
  .search-bar.empty .search-clear{ display:none; }

  /* ---------- Pull-to-refresh indicator ---------- */
  .ptr{ position:absolute; left:50%; top:calc(var(--safe-t) + 38px); transform:translate(-50%, -28px); width:36px; height:36px; border-radius:50%; background:var(--surface); border:1px solid var(--line); box-shadow:var(--shadow-sm); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; z-index:35; transition:transform .25s var(--ease), opacity .2s ease; }
  .ptr.show{ opacity:1; transform:translate(-50%, var(--ptr-y, 8px)); }
  .ptr svg{ width:18px; height:18px; color:var(--green); }
  .ptr.spin svg{ animation:ptr-spin 1s linear infinite; }
  @keyframes ptr-spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ---------- Sortable list (Meer-tab: schap-volgorde) ---------- */
  .sort-list{ display:flex; flex-direction:column; gap:6px; }
  .sort-row{ display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow-sm); touch-action:none; user-select:none; -webkit-user-select:none; transition:transform .18s var(--ease), box-shadow .18s ease; }
  .sort-row.dragging{ transform:scale(1.02); box-shadow:var(--shadow-lg); z-index:5; opacity:.95; }
  .sort-row .sr-emoji{ font-size:20px; width:30px; text-align:center; flex:0 0 auto; }
  .sort-row .sr-label{ flex:1; font-size:16px; font-weight:600; }
  .sort-row .sr-handle{ flex:0 0 auto; color:var(--ink-faint); width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:grab; }
  .sort-row .sr-handle svg{ width:18px; height:18px; }
  .sort-row .sr-del{ flex:0 0 auto; border:0; background:transparent; color:var(--ink-faint); padding:4px 6px; font-size:13px; font-weight:600; }
  .sort-row .sr-del:active{ color:var(--red); }

  /* ---------- Emoji-picker (compact) ---------- */
  .emoji-picker{ display:grid; grid-template-columns:repeat(8, 1fr); gap:6px; margin:4px 0 8px; }
  .emoji-picker .ep-cell{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:22px; border:1px solid var(--line); background:var(--surface-2); border-radius:10px; padding:0; transition:transform .12s var(--ease), background .15s ease; }
  .emoji-picker .ep-cell:active{ transform:scale(.92); background:var(--surface-3); }
  .emoji-picker .ep-cell.on{ background:var(--green-2); border-color:transparent; }

  /* ---------- Recente activiteit (in share-sheet) ---------- */
  .activity-row{ display:flex; align-items:center; gap:10px; padding:8px 4px; font-size:14px; }
  .activity-row .ar-icon{ flex:0 0 auto; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; color:#fff; font-weight:800; }
  .activity-row .ar-icon.add{ background:var(--green); }
  .activity-row .ar-icon.done{ background:var(--amber); }
  .activity-row .ar-text{ flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--ink); }
  .activity-row .ar-text b{ font-weight:600; }
  .activity-row .ar-time{ flex:0 0 auto; font-size:12px; color:var(--ink-faint); }

  /* ---------- Intro stappen (onboarding) ---------- */
  .intro-stage{ display:flex; flex-direction:column; align-items:center; padding:10px 4px 4px; min-height:280px; }
  .intro-card{ width:100%; max-width:340px; padding:28px 22px; background:var(--surface-2); border:1px solid var(--line); border-radius:22px; text-align:center; box-shadow:var(--shadow-sm); margin-bottom:18px; }
  .intro-card .ic-glyph{ font-size:46px; margin-bottom:14px; line-height:1; }
  .intro-card h4{ font-family:var(--display); font-size:22px; font-weight:600; letter-spacing:-.01em; margin:0 0 8px; }
  .intro-card p{ font-size:15px; line-height:1.45; color:var(--ink-soft); margin:0; }
  .intro-dots{ display:flex; gap:8px; margin:6px 0 18px; }
  .intro-dots .id-dot{ width:8px; height:8px; border-radius:50%; background:var(--surface-3); transition:background .2s ease, width .25s var(--ease); }
  .intro-dots .id-dot.on{ background:var(--green); width:22px; border-radius:99px; }

  /* ---------- Inline rename (share-sheet) ---------- */
  .inline-rename{ display:flex; align-items:center; gap:10px; width:100%; }
  .inline-rename input{ flex:1; min-width:0; border:1px solid var(--line); border-radius:12px; background:var(--surface-2); padding:11px 13px; font-size:18px; font-family:var(--display); font-weight:600; letter-spacing:-.01em; -webkit-user-select:text; user-select:text; }
  .inline-rename .ir-save{ flex:0 0 auto; border:0; background:var(--green); color:var(--on-green); padding:10px 14px; border-radius:12px; font-size:14px; font-weight:700; }
  .inline-rename .ir-cancel{ flex:0 0 auto; border:0; background:transparent; color:var(--ink-soft); padding:10px 4px; font-size:14px; font-weight:600; }

  /* ---------- Member-rij in share-sheet kick/leave-knop ---------- */
  .ls-item .lsi-member-action{ flex:0 0 auto; border:0; background:transparent; color:var(--ink-faint); padding:6px 8px; font-size:13px; font-weight:600; border-radius:10px; }
  .ls-item .lsi-member-action.kick:active{ color:var(--red); background:color-mix(in srgb, var(--red) 8%, transparent); }
  .ls-item .lsi-member-action.leave:active{ color:var(--red); background:color-mix(in srgb, var(--red) 8%, transparent); }

  /* ---------- Section overflow-link ---------- */
  .section .more-link{ background:none; border:0; padding:2px 4px; font-size:13px; font-weight:700; color:var(--green); text-transform:none; letter-spacing:0; }
  .section .more-link:active{ opacity:.7; }

  /* ---------- Section collapse ---------- */
  .section.collapsible{ cursor:pointer; user-select:none; -webkit-user-select:none; }
  .section.collapsible .count{ margin-left:auto; }
  .section.collapsible .sec-chevron{ width:14px; height:14px; color:var(--ink-faint); transition:transform .22s var(--ease); flex:0 0 auto; margin-left:8px; }
  .section.collapsible.collapsed .sec-chevron{ transform:rotate(-90deg); }
  ul.list.collapsed{ display:none; }

  /* ---------- Slide-in voor nieuwe items ---------- */
  @keyframes rowSlideIn{
    from{ opacity:0; transform:translateY(-10px) scale(.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .row.entering{ animation:rowSlideIn .32s var(--ease) backwards; }

  /* ---------- Crisper checkmark (path-drawing animation) ---------- */
  .check svg path{ stroke-dasharray:24; stroke-dashoffset:24; }
  .row.done .check svg{ opacity:1; transform:scale(1); }
  .row.done .check svg path{ animation:drawCheck .32s var(--ease) forwards; }
  @keyframes drawCheck{ from{ stroke-dashoffset:24; } to{ stroke-dashoffset:0; } }

  /* ---------- Tap-ripple ---------- */
  .chip, .catchip, .cadchip, .sc-chip, .mbtn, .sheet-actions .save, .sheet-actions .del{ position:relative; overflow:hidden; }
  .ripple-host{ position:relative; overflow:hidden; }
  .ripple{ position:absolute; border-radius:50%; background:currentColor; pointer-events:none; opacity:.18; transform:scale(0); animation:ripple-pulse .55s var(--ease) forwards; }
  @keyframes ripple-pulse{
    0%{ transform:scale(0); opacity:.22; }
    100%{ transform:scale(2.6); opacity:0; }
  }

  /* ---------- Rich undo-toast ---------- */
  .toast{ display:inline-flex; align-items:center; gap:0; }
  .toast .toast-msg{ flex:1; }
  .toast .toast-action{ background:transparent; border:0; color:color-mix(in srgb, var(--green) 80%, var(--bg)); font-weight:800; padding:6px 12px; margin-left:10px; border-radius:10px; font-size:14px; letter-spacing:.01em; }
  .toast.has-action{ padding:9px 8px 9px 18px; }
  .toast .toast-action:active{ background:color-mix(in srgb, var(--green) 22%, transparent); }

  /* ---------- Co-purchase suggestion (onder add-bar) ---------- */
  .co-suggest{ display:flex; align-items:center; gap:8px; margin:8px 0 4px; padding:0 2px; font-size:13px; color:var(--ink-soft); animation:rowSlideIn .3s var(--ease) backwards; }
  .co-suggest.hide{ display:none; }
  .co-suggest .cs-lbl{ font-weight:600; flex:0 0 auto; }
  .co-suggest .cs-pill{ display:inline-flex; align-items:center; gap:5px; background:var(--green-2); color:var(--green); border:0; border-radius:99px; padding:5px 11px; font-size:13px; font-weight:700; transition:transform .12s var(--ease); }
